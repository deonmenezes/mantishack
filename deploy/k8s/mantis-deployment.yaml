# Kubernetes deployment for Mantis (PRD §14.5).
# Pairs with the CRD defined by mantis-k8s — install that first via
#   kubectl apply -f deploy/k8s/mantis-engagement-crd.yaml
# (the CRD itself is generated by the operator binary; see
#  `mantis-k8s --print-crd` for the canonical form.)

apiVersion: v1
kind: Namespace
metadata:
  name: mantis
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mantis-daemon
  namespace: mantis
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mantis-daemon
  namespace: mantis
rules:
  - apiGroups: ["mantis.example.com"]
    resources: ["engagements", "engagements/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mantis-daemon
  namespace: mantis
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mantis-daemon
subjects:
  - kind: ServiceAccount
    name: mantis-daemon
    namespace: mantis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mantis-daemon
  namespace: mantis
  labels:
    app: mantis-daemon
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mantis-daemon
  template:
    metadata:
      labels:
        app: mantis-daemon
    spec:
      serviceAccountName: mantis-daemon
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mantis-daemon
          image: ghcr.io/deonmenezes/mantishack:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MANTIS_WORKSPACE
              value: /workspace
            - name: RUST_LOG
              value: info
          ports:
            - containerPort: 8080
              name: web
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "4Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: mantis-workspace
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mantis-workspace
  namespace: mantis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mantis-web
  namespace: mantis
spec:
  type: ClusterIP
  selector:
    app: mantis-daemon
  ports:
    - name: web
      port: 80
      targetPort: 8080
