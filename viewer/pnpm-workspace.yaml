# pnpm v11+ settings for the mantis-viewer package.
# (Even single-package projects need a workspace file for these
# settings now — pnpm dropped the `pnpm` field in package.json.)

# Supply-chain hardening: refuse packages published less than 3 days
# ago. Community detection + npm unpublish for compromised versions
# typically lands inside 48 hours; 3 days gives a comfortable margin.
minimumReleaseAge: 4320
minimumReleaseAgeExclude: []

# Postinstall scripts are denied by default since pnpm v10. Whitelist
# only the ones we need to run.
#   - esbuild: vite uses it; postinstall picks the right native
#     binary for the current platform.
#   - msw:     mock service worker; not currently used at runtime
#              (transitive dep) — keep denied.
allowBuilds:
  esbuild: true
  msw: false
