[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Wildcard pinning between sibling crates inside this Cargo workspace is
# normal — cargo workspaces routinely use { path = "..." , version = "*" }.
# Reject wildcards only on external crates.io deps.
allow-wildcard-paths = true

[advisories]
yanked = "deny"
ignore = [
    # wasmtime 26 — Cranelift aarch64 sandbox-escape advisories.
    # Mantis only runs wasm bytecode produced by its own synthesizer
    # against its own primitives; we do not expose wasmtime to untrusted
    # input. Bumping to wasmtime 43+ requires API changes in
    # mantis-sandbox + mantis-synthesizer; tracked as a follow-up.
    "RUSTSEC-2026-0095",
    "RUSTSEC-2026-0096",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
