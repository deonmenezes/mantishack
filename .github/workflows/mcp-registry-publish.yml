name: Publish to MCP Registry

on:
  push:
    branches: [main]
    paths:
      - "server.json"
      - ".github/workflows/mcp-registry-publish.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          ARCH="$(uname -m | sed 's/aarch64/arm64/;s/x86_64/amd64/')"
          VERSION="v1.7.9"
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${VERSION}/mcp-publisher_linux_${ARCH}.tar.gz"
          tar -xzf mcp-publisher.tar.gz
          chmod +x mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate server.json

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
