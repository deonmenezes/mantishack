name: oauth_saml_oidc
description: |
  Federated-identity FLOW abuse — bugs in the OAuth2 / OIDC / SAML
  authentication DANCE itself, not in a single signed token. The trust
  lens: the relying party (RP) assumes the round-trip is bound to one
  user, one origin, and one issuer — that the browser that started the
  login is the browser that finishes it, that the code/assertion it
  redeems was minted for ITS client, and that the identity it links to a
  local account is one the IdP actually vouched for. Break any of those
  bindings — drop 'state', let redirect_uri wander, swap an authorization
  code, wrap a second SAML assertion around a real signature, or trust an
  email the IdP never verified — and the attacker logs in as someone else.
signals:
  paths:
    - oauth
    - oauth2
    - oidc
    - openid
    - saml
    - sso
    - auth/callback
    - auth/redirect
    - login/callback
    - social
    - connect
    - /acs
    - assertion-consumer
    - identity/
    - idp
    - federation
  includes:
    - requests_oauthlib
    - authlib
    - oauthlib
    - python3-saml
    - python-saml
    - onelogin.saml2
    - pysaml2
    - saml2
    - passport
    - passport-saml
    - passport-oauth2
    - openid-client
    - next-auth
    - "@node-saml"
    - spring-security-oauth2
    - opensaml
    - org.opensaml
    - "OneLogin\\Saml2"
    - omniauth
    - omniauth-saml
    - ruby-saml
    - golang.org/x/oauth2
    - coreos/go-oidc
  function_keywords:
    - redirect_uri
    - state
    - nonce
    - code_verifier
    - code_challenge
    - pkce
    - callback
    - authorize
    - token_endpoint
    - id_token
    - userinfo
    - assertion
    - audience
    - issuer
    - relaystate
    - account_link
    - link_account
    - exchange_code
  function_calls:
    - fetch_token
    - parse_request_uri_response
    - authorize_access_token
    - parse_id_token
    - validate_id_token
    - OneLogin_Saml2_Response
    - process_response
    - parse_authn_request_response
    - is_valid
    - get_nameid
    - validateSignature
    - validate_signature
    - assertConsumerService
    - exchangeCodeForToken
    - getAuthorizationCode
    - findOrCreateUser
    - linkAccount
  cwes:
    - CWE-1275  # sensitive cookie / missing state -> login CSRF in flow
    - CWE-352   # cross-site request forgery (forced login / account link)
    - CWE-347   # improper verification of signature (SAML XSW)
    - CWE-601   # open redirect (redirect_uri token/code theft)
    - CWE-287   # improper authentication (mix-up, code injection, replay)
    - CWE-290   # authentication bypass by spoofing (assertion replay)
    - CWE-384   # session fixation via login flow
key_questions:
  - "Is the 'state' parameter (OAuth/OIDC) or 'RelayState'/InResponseTo (SAML) generated server-side, bound to the user's session, AND verified for equality on the callback — or is it absent, ignored, only checked for presence, or (as in Redash/CVE-2021-43777) repurposed to carry a predictable next-URL, leaving the flow open to login CSRF / forced sign-in and account-link takeover?"
  - "Is redirect_uri validated by EXACT, full-string match against a pre-registered allowlist, or by a loose rule (prefix, startswith, host-only, regex, suffix, subdomain wildcard) that an attacker can satisfy with `//evil.com`, `https://app.com.evil.com`, an open-redirect on the legit host, a path-traversal `..`, an extra query/fragment, or a userinfo `@` — and are the registered URIs treated as raw regex with unescaped dots (the Authentik/CVE-2024-52289 mistake) so `app.com` also matches `app0com`?"
  - "On the token exchange, does the RP confirm the id_token's `iss` matches the IdP it actually sent the user to and `aud` equals its OWN client_id — and does it bind the returned authorization code to the same provider/session that initiated the request, defeating IdP mix-up and authorization-code injection?"
  - "For PKCE: is `code_challenge` sent on the authorize request AND `code_verifier` enforced at the token endpoint by the RP's own server, or can a downgrade (omit challenge, accept `plain`, or skip verifier entirely) let a stolen code be redeemed by anyone?"
  - "In the SAML path, is the signature verified over the SAME assertion/element whose attributes are later READ (signature-wrapping / XSW), and is the reference resolved by an XPath that cannot select an attacker-smuggled node — e.g. relative `./ds:Reference` rather than descendant `//ds:Reference` as in ruby-saml/CVE-2024-45409 — and are `Audience`, `NotOnOrAfter`, `Recipient`, and `InResponseTo` enforced with each assertion ID tracked to block replay?"
  - "When mapping the federated identity to a LOCAL account, does the code link on a provider-issued, immutable, IdP-verified identifier (`sub` + issuer), or does it match on email / username — and does it trust `email_verified`/the email claim from an IdP (or unverified provider) the attacker can control, enabling 'sign in with' account takeover?"
prompt_addendum: |
  This is a STATE-MACHINE bug class, not a token-parsing one. A token may
  be perfectly signed and still be accepted in the wrong flow. Reconstruct
  the round-trip and look for the broken binding at each leg.

  1. AUTHORIZE leg — find where the RP builds the IdP URL. Confirm a
     cryptographically random `state` (OAuth/OIDC) or `RelayState`+
     `AuthnRequest` ID (SAML) is generated, stored in the session/signed
     cookie, and that `code_challenge`/`nonce` are set. MISSING state is
     CWE-1275 login CSRF: the attacker completes a login with THEIR IdP
     account, hands the victim the callback URL, and the victim is silently
     signed into the attacker's account — then types secrets into it, or
     (the dangerous direction) the attacker forces the victim's session to
     LINK the attacker's social identity onto the victim's existing local
     account. Grep for `state` only appearing on the authorize URL but
     never compared on `/callback`; presence-only checks (`if state:`) are
     not validation — demand an equality compare against the stored value.
     A subtle variant (Redash, CVE-2021-43777): `state` IS round-tripped,
     but it carries a predictable next/redirect value instead of an
     unguessable per-session token, so it provides zero CSRF protection.

  2. REDIRECT_URI — the canonical token-theft primitive. The check that
     matters is on the AUTHORIZATION SERVER, but RPs re-introduce the bug
     by passing attacker-influenced `redirect_uri`/`returnTo`/`next` and by
     post-login redirecting to a user-controlled URL. The move semgrep
     can't make: judge the MATCHER. Flag anything that isn't exact equality
     against a fixed registered set —
       * `startswith`/prefix:  registered `https://app.com/cb`, attacker
         sends `https://app.com/cb.evil.com` or `https://app.com/cb@evil.com`.
       * host/`endsWith` on host: `evil-app.com` ends with `app.com`;
         `https://app.com.evil.com` passes a naive contains.
       * REGEX with unescaped metacharacters: the registered URI is fed to
         `re.fullmatch`/`preg_match` verbatim, so the dots in
         `app.example.com` match ANY char and `app0example.com` validates —
         the Authentik CVE-2024-52289 one-click-ATO bug. Treat any regex
         redirect_uri matcher as guilty until the dots are proven escaped.
       * subdomain wildcard `*.app.com` where any subdomain is takeoverable
         or hosts an open redirect (one open redirect anywhere on an
         allowed origin = full code/token exfil via `response_type=token`
         or `code` leaked in Referer/fragment).
       * scheme-relative `//evil.com` and backslash `/\evil.com` that
         browsers treat as absolute.
     If `redirect_uri` reaches the authorize URL from request input AND the
     post-callback redirect target is user-controlled, the implicit-flow
     `access_token` (URL fragment) or the `code` leaks to the attacker.

  3. TOKEN-EXCHANGE leg — three distinct attacks:
       * IdP MIX-UP (CWE-287): RP supports multiple IdPs and routes the
         callback to a token endpoint chosen from request data or a cookie
         rather than from the issuer it actually initiated with. Attacker
         starts a flow at an honest-but-curious IdP, gets the victim to
         complete at the attacker's IdP, and the RP redeems the code at the
         wrong endpoint or accepts an `id_token` whose `iss` it never
         checks. REQUIRE: `iss` pinned to the initiating provider and `aud`
         == own client_id.
       * AUTHORIZATION-CODE INJECTION: a code phished/stolen from another
         context is pasted into the victim's session. PKCE is the defense —
         a stolen code is useless without the matching `code_verifier`. So
         a missing/downgraded PKCE turns code leakage into account takeover.
       * PKCE DOWNGRADE: server accepts `code_challenge_method=plain`, or
         never enforces the verifier, or the RP omits the challenge
         entirely. Grep the token call for whether `code_verifier` is
         actually passed AND server-side checked.

  4. SAML — the XSW (XML Signature Wrapping) family, CWE-347. The defect is
     a GAP between the element the signature COVERS and the element the
     code READS for identity. Chase:
       * XPath/reference desync: signature validated against a node located
         by a too-permissive selector. The ruby-saml/GitLab CVE-2024-45409
         (CVSS 10.0) case used a descendant-axis XPath (`//ds:Reference`,
         `//ds:Signature`) so an attacker could smuggle a forged
         `DigestValue`/assertion into `samlp:Extensions` (or wrap one around
         the signed node) and have it selected instead of the genuine one.
         Demand relative, anchored selection (`./ds:Reference`) and that the
         resolved reference is the SAME assertion read for identity.
       * Text-node/comment desync: signature validated against the signed
         assertion, but `getNameID()`/attribute extraction walks the DOM and
         re-serializes the NameID, so an injected XML comment splits the
         value — `admin@victim.com<!---->.evil.com` — and identity reads a
         DIFFERENT string than was signed. This is the python-saml /
         ruby-saml / OmniAuth CVE-2017-11427 class.
       * Verify presence-only: `is_valid()` returns true if SOME signature
         validates, while attributes are read from an unsigned node.
       * Missing conditions: no `Audience` restriction (assertion minted
         for another SP is replayed at yours), no `NotOnOrAfter`/`Recipient`
         /`InResponseTo` check, no assertion-ID replay cache.
       * XXE/DTD on the SAML XML parser (feeds back into SSRF/file read).
     Demand: signature reference resolves to the SAME assertion read for
     identity, the document is schema-hardened, and Conditions are enforced.

  5. ACCOUNT LINKING / 'sign in with' takeover (CWE-287/CWE-290). The
     identity must key on `(iss, sub)` — provider-issued, immutable. Flag
     linking/lookup by `email`, `username`, or phone, and flag trusting
     `email_verified=false` or an email from a provider that lets users set
     arbitrary unverified emails. Pre-account-creation: if the RP creates a
     local account for an email before the victim ever signed up, the
     attacker pre-registers, then the victim's first SSO login MERGES into
     the attacker's account. Grep `findOrCreate`/`find_or_create_by(email:`
     in OAuth callbacks.

  Conclude a finding when a binding is broken: state/RelayState not bound
  and equality-checked (or used as a predictable next-URL); redirect_uri
  matched by anything other than exact allowlist equality, including a
  regex with unescaped dots; id_token `iss`/`aud` unverified or the code
  not bound to its initiating session; PKCE absent/downgraded; a SAML
  signature whose covered element differs from the read element (XPath
  desync or comment-split NameID), or missing Conditions/replay defense; or
  identity linked on a mutable/unverified attribute. A valid signature on a
  token does NOT close any of these — the bug lives in the flow, not the
  crypto.
exemplars:
  - cve: CVE-2017-11427
    title: python-saml SAML XML-comment NameID signature-wrapping bypass
    pattern: |
      OneLogin's python-saml (`OneLogin_Saml2`, fixed in 2.4.0; affected
      <= 2.3.0) extracted the NameID from the SAML Response by reading the
      text content of the NameID node, while signature validation was
      performed against the signed assertion separately. By injecting an XML
      comment into the NameID — `user@victim.com<!---->.attacker.com` or
      `admin@victim.com<!-- -->` — the XML text-node processing returned
      only the substring before the comment, so the value the application
      read as the authenticated user differed from the bytes the IdP signed
      and the SP verified. The companion ruby-saml and OmniAuth SAML
      libraries shared the same class of defect.
    why_buggy: |
      Two views of one document. The signature check said "this assertion
      is authentic"; the identity extraction said "the user is X" — but
      they consumed DIFFERENT serializations of the NameID, so an attacker
      who could mint a signed assertion for ANY low-value account they
      controlled could rewrite the effective username via comment injection
      and authenticate as a high-value account. The trust violation: the SP
      assumed the string it read for identity was the string that was
      signed. Whenever signature verification and attribute reading don't
      operate on the identical, canonicalized element, the signature
      protects nothing — the textbook XSW outcome of CWE-347.
  - cve: CVE-2024-45409
    title: ruby-saml / GitLab descendant-axis XPath SAML signature bypass
    pattern: |
      ruby-saml (< 1.17.0) and omniauth-saml (< 2.2.1), as used in GitLab,
      verified the SAML Response signature using descendant-axis XPath
      selectors (`//ds:Signature`, `//ds:Reference`) in `xml_security.rb`
      instead of relative, anchored selectors. Because `//` matches any
      node in the document, an unauthenticated attacker possessing a single
      validly-signed SAML document from the IdP could smuggle a forged
      `DigestValue`/assertion into a `samlp:Extensions` block (or wrap an
      unsigned assertion around the genuine signed one). The verifier
      selected the attacker's smuggled element as the "signed" reference
      while identity was read from the forged assertion, yielding a CVSS
      10.0 authentication bypass — log in as any user.
    why_buggy: |
      The reference resolution and the identity read pointed at different
      nodes because the XPath was not anchored to the element that was
      actually signed. `//ds:Reference` says "find a Reference anywhere,"
      so the attacker only has to place a matching Reference/Digest
      somewhere the document still parses, and the canonicalized bytes that
      validate are not the bytes that establish identity. This is the
      structural heart of XML Signature Wrapping (CWE-347): a valid
      signature over element A is accepted as authorization for the contents
      of attacker-controlled element B. The fix anchored selection to the
      signed assertion and rejected documents with multiple/ambiguous
      references.
  - cve: CVE-2024-52289
    title: Authentik OAuth redirect_uri regex (unescaped dot) account takeover
    pattern: |
      Authentik (< 2024.10.3 / < 2024.8.5) validated the OAuth2/OIDC
      `redirect_uri` by treating each configured URI as a regular
      expression and calling `fullmatch(configured, request_redirect_uri)`,
      without escaping regex metacharacters. The dots in a registered URI
      such as `https://app.example.com/oauth2/callback` were interpreted as
      "any character," so an attacker-supplied `redirect_uri` like
      `https://app0example.com/oauth2/callback` (a domain they own) passed
      validation. With the victim already authenticated, the authorization
      `code`/token was delivered to the attacker's host, yielding one-click
      account takeover. The fix made strict string matching the default and
      gated regex behind explicit administrator opt-in.
    why_buggy: |
      `redirect_uri` is the ONE OAuth parameter that decides where the
      crown-jewel credential lands, so it must be matched by exact, whole-
      string equality against pre-registered URIs. Reusing the registered
      value as an unescaped regex silently widens "is exactly our callback"
      into "matches a pattern our callback happens to satisfy," and every
      `.` becomes a wildcard the attacker fills with their own character to
      register a confusable domain. The attacker breaks no crypto: the IdP
      faithfully signs the token and faithfully delivers it to the
      attacker-chosen-but-"allowed" URL. CWE-601 (open redirect in the auth
      flow) escalating directly into CWE-287 account takeover.
  - cve: CVE-2021-43777
    title: Redash OAuth 'state' used as predictable next-URL, enabling login CSRF
    pattern: |
      Redash (<= 10.0) implemented Google OAuth login such that the `state`
      parameter was used to carry the post-login redirect ("next") URL
      rather than an unguessable, session-bound CSRF token. Because `state`
      was static and predictable, it provided no protection against
      cross-site request forgery: an attacker could initiate the OAuth flow
      themselves, obtain a valid callback bound to THEIR Google account, and
      deliver that callback URL to a victim (link, hidden iframe, auto-
      submitting form). The victim's browser completed the flow and was
      silently signed into the attacker's account. The fix migrated to
      Authlib, which generates and validates a random `state` token
      automatically.
    why_buggy: |
      `state` is the CSRF token of the OAuth dance: it binds the callback to
      the exact browser/session that began the flow, so it MUST be random,
      per-session, and equality-checked. Overloading it to carry a
      predictable next-URL is functionally the same as having no `state` at
      all — the RP can no longer distinguish the user's own login from an
      attacker-supplied one (CWE-1275 / CWE-352). The dangerous direction is
      account-link / forced-login takeover: nothing changes visibly, yet the
      victim is now operating inside the attacker's federated session (or,
      if the endpoint links identities, the attacker's login is bound onto
      the victim's account). Presence-only or static `state` handling is not
      validation.
