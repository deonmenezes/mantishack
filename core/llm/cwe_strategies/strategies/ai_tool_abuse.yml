name: ai_tool_abuse
description: |
  Attacking the AI/LLM surface: any path where untrusted text reaches a
  model and the model's behaviour or output then crosses a trust boundary.
  Direct prompt injection ("ignore your instructions") AND indirect /
  second-order injection where the payload arrives inside RAG documents,
  retrieved web pages, emails, file contents, or tool results the model
  later reads. Covers LLM tool / function-call abuse and agentic over-
  privilege (an agent holding shell / DB / HTTP / file tools coerced into
  misusing them), system-prompt and secret/key disclosure, and the sink
  that turns a chatbot into RCE: UNSAFE MODEL OUTPUT flowing into eval /
  SQL / shell / file / HTTP without treating it as attacker-tainted.
  The trust lens is that developers treat the model as part of the trusted
  code (its instructions immutable, its output sanitised, its tools safe to
  expose) when in fact every token it reads and emits is attacker-reachable.
  Maps to OWASP LLM01 (prompt injection), LLM02 (insecure output handling),
  LLM06 (excessive agency), and LLM08 (sensitive information disclosure).

