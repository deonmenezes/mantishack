name: deserialization
description: |
  Code that reconstructs in-memory objects from an external byte
  stream. The bug class (CWE-502): a deserializer that can instantiate
  arbitrary types or invoke type-defined hooks is fed attacker-
  controlled bytes. The trust lens: the format is treated as inert
  data, but the deserializer is actually a small interpreter that
  runs constructors, magic methods, and gadget chains the attacker
  picks.

signals:
  paths:
    - serializ
    - deserializ
    - /api/
    - controllers/
    - rpc/
    - messaging/
    - queue/
    - cache/
    - session/
    - marshal
    - pickle
  includes:
    - pickle
    - cPickle
    - _pickle
    - import dill
    - import jsonpickle
    - import yaml
    - from ruamel
    - java.io.ObjectInputStream
    - com.fasterxml.jackson
    - com.thoughtworks.xstream
    - org.yaml.snakeyaml
    - System.Runtime.Serialization.Formatters.Binary
    - Newtonsoft.Json
    - require 'yaml'
    - require 'psych'
  function_keywords:
    - deserialize
    - unserialize
    - unmarshal
    - readObject
    - fromXML
    - load
    - loads
    - unpickle
    - restore
    - rehydrate
    - readResolve
    - __reduce__
    - __wakeup
  function_calls:
    - pickle.loads
    - pickle.load
    - cPickle.loads
    - _pickle.loads
    - dill.loads
    - dill.load
    - jsonpickle.decode
    - yaml.load
    - yaml.unsafe_load
    - yaml.full_load
    - .readObject(
    - .readUnshared(
    - new ObjectInputStream
    - .readValue(
    - enableDefaultTyping
    - .fromXML(
    - unserialize(
    - BinaryFormatter
    - LosFormatter
    - ObjectStateFormatter
    - NetDataContractSerializer
    - SoapFormatter
    - TypeNameHandling
    - Marshal.load
    - Marshal.restore
    - marshal_load
    - Psych.load
    - YAML.load
  cwes:
    - CWE-502   # deserialization of untrusted data
    - CWE-94    # code injection
    - CWE-915   # improperly controlled modification of object attributes
    - CWE-913   # improper control of dynamically-managed code resources
    - CWE-470   # unsafe reflection / class from name
    - CWE-20    # improper input validation (the upstream trust failure)

key_questions:
  - "Where do the bytes fed to this deserializer come from — an HTTP body, a cookie/session blob, a message queue, a cache entry, an uploaded file? Can any of those cross a trust boundary?"
  - "Can the format encode WHICH type to instantiate (a class/module reference embedded in the stream), or is the target type fixed and validated by the caller before bytes are read?"
  - "Does the deserializer run type-defined callbacks during reconstruction — Python __reduce__/__setstate__, Java readObject/readResolve, PHP __wakeup/__destruct, .NET set-on-deserialize, Ruby marshal hooks? Those execute attacker-chosen code paths with no explicit call site."
  - "Is an allowlist of permitted classes enforced BEFORE instantiation (resolveClass override, SafeConstructor, SerializationBinder, JSON type allowlist), or does the call trust whatever the stream names?"
  - "For JSON/XML libraries: is polymorphic type handling turned on (Jackson enableDefaultTyping/@JsonTypeInfo, Json.NET TypeNameHandling.All, XStream default converters)? That re-introduces the arbitrary-type problem inside an otherwise 'safe' text format."
  - "Even with no RCE gadget present today, can an attacker-named type cause DoS (billion-laughs / deeply nested object graph), SSRF (a type that opens a URL on construct), or property-injection that mutates security-relevant fields?"

prompt_addendum: |
  Model the deserializer as an INTERPRETER, not a parser. The
  attacker controls the program (the byte stream); the deserializer
  is the VM that executes it. The exploit does not need a function
  named "eval" — it needs (1) a sink that instantiates a type named
  by the stream, plus (2) any reachable class on the classpath /
  in sys.modules whose construction or deserialization hook has a
  useful side effect (the "gadget"). Your job is to confirm the
  sink trusts the stream to name the type; you do NOT need to find
  the gadget chain to call the bug.

  The detection move that beats a plain grep: grepping the sink token
  is only step one. Step two is a DATA-FLOW JUDGEMENT and a
  CONFIGURATION JUDGEMENT that a textual match cannot make:
    1. Taint: trace the byte argument backward to a trust boundary.
       A `yaml.load(config_file_shipped_in_repo)` is not the bug; a
       `yaml.load(request.body)` is. The same token is safe or fatal
       depending on the SOURCE, which grep cannot see.
    2. Loader/allowlist argument: the danger is not the call name but
       its ARGUMENTS. `yaml.load(x, Loader=SafeLoader)` is safe;
       `yaml.load(x)` (default FullLoader/UnsafeLoader semantics
       vary by version) is not. `unserialize($x, ['allowed_classes'
       => false])` is safe; bare `unserialize($x)` is not.
       `ObjectInputStream` is safe iff a `resolveClass` override or
       a JEP-290 `ObjectInputFilter` allowlists classes. You must
       read the surrounding call site, not just the line that matched.

  Concretely chase, per language:
    * Python: ``pickle.loads`` / ``pickle.load`` / ``cPickle`` /
      ``dill.loads`` / ``jsonpickle.decode`` on request data; and
      ``yaml.load(x)`` WITHOUT ``Loader=SafeLoader`` (bare
      ``yaml.load``, ``yaml.unsafe_load``, ``yaml.full_load`` can
      construct arbitrary Python objects via ``!!python/object``).
    * Java: ``ObjectInputStream.readObject`` / ``readUnshared`` with
      no ``resolveClass`` / ``ObjectInputFilter`` allowlist; Jackson
      ``enableDefaultTyping`` or ``@JsonTypeInfo`` with a permissive
      base type; XStream ``fromXML`` with default security; SnakeYAML
      ``new Yaml()`` without ``SafeConstructor``.
    * PHP: ``unserialize($_POST/$_COOKIE/...)`` without an
      ``allowed_classes`` option (pre-7.0 has no option at all) —
      ``__wakeup``/``__destruct`` on any loadable class become POP
      gadgets.
    * .NET: ``BinaryFormatter``/``SoapFormatter``/``LosFormatter``/
      ``ObjectStateFormatter``/``NetDataContractSerializer``
      ``Deserialize`` on untrusted bytes; Json.NET with
      ``TypeNameHandling`` != ``None``.
    * Ruby: ``Marshal.load`` / ``Marshal.restore`` on untrusted
      bytes; YAML/Psych ``load`` (not ``safe_load``).

  Red flags that LOOK safe but are not: a SAST-style check that the
  blob "is valid base64" or "decompresses" or "has the right magic"
  — none of those constrain the TYPE the attacker names. A type
  allowlist must be enforced at the resolveClass / constructor
  boundary, not by inspecting the bytes. Also flag the "we encrypt/
  HMAC the cookie so it's trusted" pattern when the signing key is
  shipped in the repo, defaulted, or derivable — a leaked key turns
  a signed session blob straight back into an arbitrary-object sink.

exemplars:
  - cve: CVE-2017-9805
    title: Apache Struts2 REST plugin XStream RCE via deserialized XML (S2-052)
    pattern: |
      An HTTP request body with ``Content-Type:
      application/xml`` is handed to the REST plugin's
      ``XStreamHandler.toObject()``, which calls XStream's
      ``fromXML`` with the default (permissive) converter set and
      no type restriction. The XML names the types to instantiate;
      XStream constructs them, walking a chain of classes whose
      construction side effects culminate in command execution.
      Unauthenticated; affects Struts 2.1.2–2.3.33 and 2.5–2.5.12.
    why_buggy: |
      The endpoint assumed XML is just data describing a DTO. But
      XStream's default mode lets the document specify ANY class on
      the classpath and how to populate its fields, so the request
      body is really a program. No allowlist was applied before
      instantiation, so an unauthenticated POST chooses the gadget
      chain. The detection move: an externally reachable handler
      passing request bytes into ``fromXML`` with no
      ``XStream.allowTypes`` / security framework configured.
  - cve: CVE-2015-7501
    title: Apache Commons Collections Java ObjectInputStream gadget (JBoss/WebLogic et al.)
    pattern: |
      A network-facing endpoint reads a serialized Java object
      with ``ObjectInputStream.readObject()`` directly off
      attacker-controlled bytes, with no ``resolveClass`` override
      restricting permitted classes. With commons-collections on
      the classpath, an ``InvokerTransformer`` chain (driven via a
      ``PriorityQueue``) embedded in the stream executes a runtime
      command during deserialization.
    why_buggy: |
      ``readObject`` is treated as a typed decode of an expected
      object, but it will instantiate whatever the stream names and
      run that type's ``readObject``/``readResolve`` hooks. The
      assumption violated: "the bytes describe an instance of the
      type I want." They describe an arbitrary object graph. Because
      no allowlist gates ``resolveClass``, any gadget-bearing
      library on the classpath becomes a code-execution primitive.
      The bug is callable the moment you see a ``readObject`` whose
      input traces to the network with no class filter.
  - cve: CVE-2020-1948
    title: Apache Dubbo provider RCE via untrusted Hessian2 deserialization
    pattern: |
      A Dubbo RPC provider deserializes a service-invocation payload
      from a remote peer using the default Hessian2 deserializer
      without restricting the decoded types. A crafted request
      carrying an unrecognized service/method name plus a malicious
      parameter payload causes the provider to instantiate an
      attacker-named gadget type (e.g. via rome / xbean on the
      classpath, reaching JNDI/LDAP) while decoding the call.
    why_buggy: |
      The provider trusted that an inbound RPC frame only contains
      the declared method-argument types. The deserializer instead
      honors type information carried in the payload itself, so a
      remote caller selects the class to construct. The lesson that
      generalizes: any RPC/message boundary that reconstructs
      "objects" rather than validated primitives is a CWE-502 sink
      unless a type allowlist is enforced at decode time — protocol
      framing and transport auth do not constrain the object graph
      inside.
