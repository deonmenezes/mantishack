name: auth_token_confusion
description: |
  JWT / signed-token verification logic: the bug class is a token whose
  cryptographic guarantee is silently downgraded or skipped. The trust lens:
  the token header (alg, kid, jwk, jku) is ATTACKER-CONTROLLED, yet the
  verifier treats it as authoritative — choosing the algorithm, the key, or
  even accepting "no signature" based on values the forger picked. Also covers
  registered claims the verifier never checks (aud, iss, exp, nbf) and sessions
  whose identifier survives a privilege change (fixation).

signals:
  paths:
    - /auth/
    - /jwt/
    - /token/
    - /session/
    - /login/
    - /middleware/
    - /controllers/
    - /security/
    - /identity/
  includes:
    - jsonwebtoken
    - jose
    - node-jose
    - pyjwt
    - python-jose
    - authlib
    - "io.jsonwebtoken"
    - com.auth0.jwt
    - com.nimbusds
    - "github.com/golang-jwt/jwt"
    - "github.com/dgrijalva/jwt-go"
    - passport-jwt
    - express-jwt
    - fast-jwt
  function_keywords:
    - verify
    - decode
    - validate
    - authenticate
    - claims
    - regenerate
  function_calls:
    - jwt.verify
    - jwt.decode
    - jsonwebtoken.verify
    - jwt.get_unverified_header
    - jwt.get_unverified_claims
    - JWT.decode
    - JWTVerifier
    - parseClaimsJws
    - parseClaimsJwt
    - SignedJWT.parse
    - jwtConsumer.process
    - jwt.Parse
    - jwt.ParseWithClaims
    - ParseUnverified
    - VerifyAudience
    - getUnverifiedHeader
    - login_user
    - session.regenerate
    - request.session.cycle_key
  cwes:
    - CWE-287   # improper authentication
    - CWE-290   # authentication bypass by spoofing
    - CWE-294   # authentication bypass by capture-replay
    - CWE-345   # insufficient verification of data authenticity
    - CWE-346   # origin validation error (aud/iss)
    - CWE-347   # improper verification of cryptographic signature
    - CWE-384   # session fixation
    - CWE-613   # insufficient session expiration

key_questions:
  - "Where does the verifier learn WHICH algorithm to use — from a fixed server-side allowlist, or from the token's own `alg` header? If the header decides, an attacker can pick `none` or downgrade RS256->HS256."
  - "Is `alg: none` (or `None`/`HS256` when an RSA/EC key is configured) reachable on any verify path? Does the library treat an empty/absent signature as 'verified'?"
  - "When an asymmetric key is in play, can the SAME key object be (mis)used as an HMAC secret? If the verify call passes the RSA *public* key and accepts HS256, the public key — known to everyone — becomes the MAC secret."
  - "Does the verifier trust key material embedded IN the token — a `jwk`, `jku`, `x5u`, or `kid` that selects/fetches a key the attacker influences? Self-signed tokens validate against their own bundled key."
  - "After signature passes, are the registered claims actually enforced — `exp`/`nbf` (expiry), `aud` (this audience), `iss` (this issuer)? A structurally valid token for a *different* service or an expired one must be rejected. Watch for type-confused claims (e.g. `aud` as an array) that silently skip the check."
  - "On login / privilege elevation, is the session identifier regenerated? If the pre-auth session id survives authentication, an attacker who planted it now rides an authenticated session (fixation)."

prompt_addendum: |
  The detection move semgrep can't make alone: trace WHO supplies the
  algorithm and the key at the verification sink, because both can be smuggled
  through the attacker-controlled token header. A grep finds the verify call;
  it cannot tell whether the algorithm set is a server constant or read from
  `header.alg`, nor whether a claim check is reached on every path.

  1) ALGORITHM PROVENANCE. Find the verify/decode call and answer: is the
     accepted-algorithm set a constant the server hardcodes, or is it derived
     from `header.alg`? Red flags by language:
       - Node `jsonwebtoken`: `jwt.verify(token, key)` with NO `algorithms:[...]`
         option, or `algorithms` left open. Pre-fix (CVE-2015-9235) this honored
         the token's own `alg`, enabling `none` and RS256->HS256.
       - Python `PyJWT`: `jwt.decode(token, key, algorithms=...)` using
         `get_default_algorithms()` / a list mixing HS* and RS*, or omitting
         `algorithms` entirely on old versions. Mixed families = confusion.
       - Java `jjwt`/`nimbus`: `parseClaimsJws` is correct; `parse`/`parseClaimsJwt`
         on an unsigned token, or a resolver that returns a key for whatever
         `alg` the header names.
       - Go `golang-jwt`: a `Keyfunc` that returns the RSA public key WITHOUT
         asserting `token.Method` is the expected concrete type
         (`*SigningMethodRSA`). If it returns the public key and the header says
         HS256, the lib HMACs with the public key. Also `ParseUnverified` used
         as if it verified.

  2) NONE / EMPTY SIGNATURE. Any path where a missing or empty signature, or
     `alg=="none"`/`"None"`, returns success. The forger sets `alg:none`,
     strips the signature, and writes any payload (`{"admin":true}`).

  3) KEY CONFUSION (HS/RS). The single most missed bug: server is configured
     with an RSA/EC key for RS256/ES256, but the verify call also accepts HS256
     and feeds the *same* key object. The attacker signs `alg:HS256` using the
     server's PUBLIC key (which they can read) as the HMAC secret — it verifies.
     Confirm the verify path PINS the asymmetric algorithm AND that the symmetric
     branch can't receive a public key (PyJWT CVE-2022-29217 shows even a
     blocklist on key formats is insufficient).

  4) HEADER-EMBEDDED KEYS. Look for the code resolving a key from `header.jwk`,
     `header.jku`/`x5u` (fetched URL), or a `kid` used to index untrusted input
     or path-traverse the keystore. A token carrying its own key is self-signed:
     it proves only that the holder controls a keypair, not identity
     (node-jose CVE-2018-0114).

  5) CLAIM ENFORCEMENT (post-signature). Even with a valid signature, chase
     whether `exp`, `nbf`, `aud`, and `iss` are CHECKED, and whether the check
     can be SKIPPED by claim type-confusion. A common shape: signature verified,
     then `payload["sub"]` trusted directly while `aud`/`exp` are ignored — so a
     token minted for another tenant/service, or one long expired, still
     authenticates. In golang-jwt (CVE-2020-26160) an `aud` supplied as a string
     ARRAY rather than a string caused a type assertion to fail and audience
     verification to be skipped when `required=false`. For symmetric secrets,
     also flag hardcoded / default / empty signing keys.

  6) SESSION FIXATION. On the login handler, confirm the framework rotates the
     session id at the auth boundary (`session.regenerate`, `request.session.cycle_key`,
     `SessionAuthenticationStrategy`, new cookie). If the id is stable across the
     anonymous->authenticated transition, a planted id grants the attacker the
     victim's authenticated session.

exemplars:
  - cve: CVE-2015-9235
    title: jsonwebtoken honors token-chosen algorithm (none + RS256->HS256)
    pattern: |
      The verifier calls `jwt.verify(token, secretOrPublicKey)` with no
      explicit `algorithms` allowlist. The library reads `alg` from the
      attacker-supplied header and uses it to select the verification routine.
      Two forgeries follow: (a) `alg:"none"` with the signature segment empty,
      which the lib accepts as "verified"; (b) `alg:"HS256"` while the server
      configured an RSA key pair — the lib HMACs the token using the RSA
      *public* key (passed in as `secretOrPublicKey`) as the symmetric secret.
    why_buggy: |
      The verifier let the UNTRUSTED token header dictate the trust algorithm.
      The whole point of a signature is that only the key-holder can produce a
      valid one — but `none` removes the requirement, and HS-with-public-key
      lets anyone who can read the public key (everyone) forge a MAC. The
      assumption "the alg in the header reflects how this token was legitimately
      signed" is exactly what the attacker controls. Fix pins a server-side
      `algorithms` allowlist so the header can never downgrade the check.

  - cve: CVE-2018-0114
    title: Cisco node-jose trusts a public key embedded in the JWS header
    pattern: |
      Verification resolves the signing key from the token itself — the `jwk`
      member inside the JWS protected header — and then validates the signature
      against that embedded key. An attacker strips the original signature,
      inserts their OWN public key as `header.jwk`, and re-signs the body with
      the matching private key they generated.
    why_buggy: |
      A self-supplied key proves only "the sender owns a keypair," never "the
      sender is the legitimate issuer." By honoring `header.jwk`, the verifier
      validates every token against whatever key the forger packed inside it, so
      every forged token passes. The violated assumption: that the verification
      key comes from a trusted, server-side source (a pinned key or a vetted
      JWKS), not from the attacker-controlled token. The same trap applies to
      `jku`/`x5u` (fetch a key from an attacker-named URL) and to `kid` used to
      index untrusted key lookups.

  - cve: CVE-2022-29217
    title: PyJWT algorithm confusion via permissive algorithm list
    pattern: |
      The decode call passes a broad algorithm set — e.g.
      `jwt.decode(token, key, algorithms=jwt.algorithms.get_default_algorithms())`
      or a list containing both HS* and RS* — so an RS256-configured service also
      accepts HS256. The attacker signs `alg:HS256` using the server's published
      RSA/EC public key (or an OpenSSH-formatted key not caught by the
      `prepare_key` blocklist) as the HMAC secret.
    why_buggy: |
      Accepting multiple algorithm families against a single key collapses the
      asymmetric guarantee: the verifier can't tell a legitimately RS256-signed
      token from one HMAC'd with the public key. The assumption "this key is only
      ever used with its intended algorithm" is broken the moment the allowlist
      spans families. The blocklist-based defense was itself bypassable, which is
      why the real fix is a narrow, single-family `algorithms` constant matching
      the key type — never a default-all set and never spanning HS/RS together.

  - cve: CVE-2020-26160
    title: golang-jwt skips audience check on a type-confused aud claim
    pattern: |
      `MapClaims.VerifyAudience` type-asserts the `aud` claim to a Go `string`.
      Per the JWT spec, `aud` may legitimately be an ARRAY of strings; when it
      is, the assertion `aud, ok := m["aud"].(string)` fails, `aud` becomes the
      empty string, and with `req` (required) set to false the function returns
      true — audience verification is silently bypassed. Callers that relied on
      `aud` to scope a token to one service therefore accept tokens minted for a
      different audience.
    why_buggy: |
      A valid signature only proves the token is authentic, not that it was
      issued FOR this service — that is the job of the `aud` claim. The verifier
      assumed `aud` is always a scalar string and that a failed assertion means
      "no audience to check," so an attacker who presents (or replays) a token
      with an array-shaped or absent `aud` slips a token intended for service A
      into service B. The fix handles both the scalar and `[]string` shapes and
      treats a malformed/missing audience as a verification failure, not a pass.
      This is the post-signature claim-enforcement half of the bug class:
      signature pinning alone does not protect a service whose `aud`/`iss`/`exp`
      checks can be skipped.
