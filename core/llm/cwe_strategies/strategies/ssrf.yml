name: ssrf
description: |
  Server-Side Request Forgery: any code path where attacker-supplied
  data decides the DESTINATION of a request the server makes on its
  own behalf (HTTP fetch, webhook, image/avatar proxy, URL preview,
  PDF/XML/SVG renderer, "import from URL"). The trust lens: the server
  treats its own egress as trusted, so a request it is tricked into
  sending inherits the server's network position — internal services,
  the cloud metadata endpoint, link-local and loopback ranges, and
  non-HTTP schemes the fetcher silently supports.

signals:
  paths:
    - /api/
    - controllers/
    - handlers/
    - webhook
    - proxy
    - fetch
    - import
    - integrations/
    - oauth
    - avatar
    - thumbnail
    - preview
  includes:
    - requests
    - urllib
    - urllib.request
    - urllib2
    - httpx
    - aiohttp
    - http.client
    - net/http
    - java.net.URL
    - java.net.HttpURLConnection
    - okhttp3
    - org.apache.http
    - axios
    - node-fetch
    - undici
    - guzzlehttp
    - open-uri
  function_keywords:
    - fetch
    - proxy
    - webhook
    - download
    - url
    - request
    - preview
    - import
    - callback
    - avatar
    - thumbnail
    - render
    - resolve
  function_calls:
    - requests.get
    - requests.post
    - requests.request
    - urllib.request.urlopen
    - urlopen
    - httpx.get
    - httpx.AsyncClient
    - aiohttp.ClientSession
    - http.Get
    - http.NewRequest
    - openConnection
    - openStream
    - HttpURLConnection
    - RestTemplate.getForObject
    - WebClient.get
    - OkHttpClient
    - HttpClient.send
    - axios.get
    - fetch
    - curl_exec
    - file_get_contents
    - Net::HTTP.get
    - open
  cwes:
    - CWE-918   # server-side request forgery
    - CWE-611   # XXE (external entity -> outbound fetch)
    - CWE-441   # unintended proxy / confused deputy
    - CWE-1385  # missing origin validation in cross-network requests
    - CWE-601   # open redirect (feeds redirect-following SSRF)

key_questions:
  - "Does any part of the request URL (scheme, host, port, path) come from user input — directly, or indirectly via a stored field, a webhook config, a redirect Location header, or a parsed document/feed?"
  - "If there's an allowlist/denylist, is it applied to the SAME string that is finally dispatched, or to a pre-parse/pre-resolution form an attacker can desync (userinfo `@`, embedded credentials, octal/hex/decimal IPs, IPv6-mapped, trailing dot, unicode/IDN, double-encoding)?"
  - "Is the host checked at validation time but re-resolved at connect time (TOCTOU), so DNS rebinding can flip a public name to 169.254.169.254 / 127.0.0.1 / a private RFC1918 address between the two lookups?"
  - "Does the client follow redirects, and if so is the redirect TARGET re-validated against the same policy, or does it blindly chase a 30x Location into the internal network or cloud metadata service?"
  - "Are non-HTTP schemes reachable — file://, gopher://, dict://, ftp://, ldap://, jar:, php filter wrappers — because the fetcher (libcurl, Java URL, PHP wrappers) accepts more than http(s)?"
  - "Are link-local (169.254.0.0/16, fe80::/10), loopback, RFC1918, CGNAT (100.64.0.0/10), and 0.0.0.0 ranges blocked AFTER resolution, including for every address a hostname resolves to?"

prompt_addendum: |
  Find the SINK first: the single call that opens an outbound
  connection (urlopen, requests.get, URL.openConnection, http.Get,
  curl_exec, file_get_contents on a URL, axios/fetch on the server).
  Then walk BACKWARD to see how much of that URL the attacker steers.
  Full URLs ("fetch this link", webhook targets, OAuth/OIDC discovery
  endpoints, SAML metadata URLs, "import from URL", PDF/SVG/XML
  external references) are the obvious case; subtler ones smuggle only
  the host or a path segment that gets concatenated into a base URL.

  The detection move semgrep cannot make is reasoning about the GAP
  between the string that gets VALIDATED and the string that gets
  FETCHED. Chase these desyncs:
    * Allowlist bypass by URL-component confusion: a check that
      inspects host via a naive split/regex while the HTTP client
      parses authority differently — `http://allowed.com@169.254.169.254/`,
      `http://169.254.169.254#@allowed.com/`, `http://allowed.com.attacker.net`,
      backslashes, or userinfo. If validation parses the URL with one
      library and the fetch uses another (or a raw string), assume they
      disagree. This is exactly the CVE-2019-8451 Jira class:
      `https://allowed-host@internal/` passed a base-URL prefix check
      while the request connected to the host after the `@`.
    * Numeric / encoded host evasion: `http://2130706433/` (decimal
      for 127.0.0.1), `http://0x7f000001/`, `http://0177.0.0.1/`
      (octal), `http://[::ffff:169.254.169.254]/`, IDN/unicode
      homoglyphs. A denylist matching the literal string
      `169.254.169.254` or `localhost` misses all of these.
    * Validate-then-reresolve (DNS rebinding): the code resolves the
      host to confirm it's public, then the HTTP client resolves AGAIN
      at connect time. An attacker-controlled DNS name with a short TTL
      returns a public IP on the first lookup and a private/metadata IP
      on the second. The fix is to pin the validated IP and connect to
      THAT; if the code re-parses the hostname for the request, flag it.
    * Redirect following: clients default to following 30x. If the
      initial URL passes validation but redirects are followed without
      re-validating each hop's host, an attacker hosts a public URL that
      301s to `http://169.254.169.254/latest/meta-data/iam/security-credentials/`
      or an internal admin port. This is the CVE-2021-21311 Adminer
      class. Look for `allow_redirects`/`followRedirects`/`redirect: 'follow'`
      left at its permissive default with no per-hop check.
    * Scheme smuggling: libcurl-backed clients and Java's URL handler
      accept `file://`, `gopher://`, `dict://`, `ldap://`; PHP accepts
      `php://filter`, `phar://`. If the code only blocks non-`http`
      schemes by checking a prefix (or not at all), `file:///etc/passwd`
      and gopher-based request smuggling become reachable.
    * Missing destination check entirely on a path nobody modeled as a
      request: this is the CVE-2021-22214 GitLab class, where parsing
      user CI YAML honored `include: remote: <url>` and the server
      fetched it with no egress restriction at all — on an endpoint
      reachable unauthenticated because "lint" was assumed side-effect
      free.
    * The crown jewel sink is the cloud metadata service. IPv4
      169.254.169.254 is the shared address across AWS, GCP, Azure, and
      OpenStack; GCP also answers on `metadata.google.internal`; AWS's
      IPv6 IMDS endpoint is `[fd00:ec2::254]` on Nitro instances; Azure
      serves at `169.254.169.254/metadata` and only requires a
      `Metadata:true` request header the attacker can usually add.
      Reaching it yields IAM/instance credentials -> cloud takeover.
      Any SSRF whose egress is unrestricted should be assumed to reach
      it unless you can prove an enforced post-resolution IP denylist.

  Conclude SSRF when: attacker influences the request destination AND
  there is no enforced, post-DNS-resolution, per-redirect-hop check
  that rejects internal/link-local/loopback IPs across every scheme the
  client supports. A check that only fires on the pre-resolution
  hostname string is not a mitigation — it is the bug.

exemplars:
  - cve: CVE-2021-22214
    title: GitLab CI Lint API unauthenticated SSRF via remote include
    pattern: |
      The `/api/v4/ci/lint` API endpoint parses user-submitted CI YAML
      and honors an `include: remote: <url>` directive by having the
      server fetch that URL to resolve the included config. The fetched
      URL's host is fully attacker-controlled and the request is issued
      from inside GitLab's trusted network with no enforced block on
      internal/link-local destinations. Affected GitLab CE/EE versions
      span >=10.5 up to the 13.10.5 / 13.11.5 / 13.12.2 fixes.
    why_buggy: |
      The server assumed a "lint" of config text was a read-only,
      side-effect-free operation, so the endpoint was reachable
      unauthenticated. But resolving a `remote` include is itself an
      outbound fetch whose destination the caller dictates. The trust
      violation: egress from the CI server was treated as trusted, so
      the attacker borrowed GitLab's network position to probe internal
      services and the cloud metadata endpoint. There was no validation
      that the include host was external — the destination check that
      should have gated a server-initiated request was simply absent on
      a path the author never modeled as "making a request."
  - cve: CVE-2019-8451
    title: Jira makeRequest SSRF via URL-authority allowlist bypass
    pattern: |
      The `/plugins/servlet/gadgets/makeRequest` resource (Jira before
      8.4.0) fetches a user-supplied URL after a `JiraWhitelist` check
      meant to limit destinations. The whitelist only checked that the
      URL began with the instance's canonical base URL, so a URL of the
      form `https://allowed-base@attacker-or-internal/` placed the
      allowed host in the userinfo component: the prefix check passed
      while the HTTP client connected to the host after the `@`.
    why_buggy: |
      Two parsers, one decision. The allowlist judged a string the
      attacker shaped specifically so the "host" it sees differs from
      the host the request library connects to. The assumption that the
      validated authority equals the fetched authority is false whenever
      validation and dispatch don't share an identical URL parser.
      Consequence: pre-auth SSRF reaching arbitrary internal network
      resources — the canonical "validate one string, fetch another"
      desync that no regex allowlist closes.
  - cve: CVE-2021-21311
    title: Adminer redirect-following SSRF to cloud metadata
    pattern: |
      Adminer's database-driver connection logic (Elasticsearch and
      ClickHouse paths, versions 4.0.0 through 4.7.8) issues an HTTP
      request to a user-supplied server address and follows HTTP
      redirects. An attacker points it at a public host they control
      which responds 301 to
      `http://169.254.169.254/latest/meta-data/iam/security-credentials/`;
      Adminer chases the redirect and surfaces the response (instance
      IAM credentials) back through error/response handling.
    why_buggy: |
      The initial destination looked benign and may even have passed a
      surface check, but the redirect target was never re-validated.
      Following a 30x is itself a fresh server-initiated request whose
      host the attacker now controls, so any front-door allowlist is
      bypassed at the second hop. On an EC2/ECS instance the redirect
      lands on the link-local metadata service and exfiltrates temporary
      AWS keys — turning a "connect to my database" feature into cloud
      account compromise (the technique UNC2903 used in the wild). The
      lesson the detector must encode: validate every hop, not just the
      first URL.
