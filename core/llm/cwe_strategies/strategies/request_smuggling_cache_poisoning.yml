name: request_smuggling_cache_poisoning
description: |
  Attacks on the multi-tier HTTP edge (CDN -> reverse proxy -> app
  server) where two hops disagree about where one request ends and the
  next begins, or about which inputs are "safe" to cache. Covers HTTP
  request smuggling / desync (CL.TE, TE.CL, TE.TE, CL.0, and HTTP/2->1
  downgrade), web cache poisoning via unkeyed inputs, and cache
  deception. The trust lens: each tier assumes the tier in FRONT of it
  already parsed the request consistently and that the cache key fully
  identifies the response -- when length framing or the keyed input set
  differs across hops, a poisoned response is served to victims who
  never sent the malicious request.

signals:
  paths:
    - proxy
    - gateway
    - edge
    - cdn
    - cache
    - nginx
    - haproxy
    - varnish
    - envoy
    - middleware
    - reverse-proxy
    - lb/
    - ingress
    - conf.d
    - vcl
  includes:
    - net/http
    - http.Server
    - http.Transport
    - httputil.ReverseProxy
    - http/2
    - golang.org/x/net/http2
    - werkzeug
    - gunicorn
    - waitress
    - twisted.web
    - aiohttp.web
    - http-proxy
    - http-proxy-middleware
    - node:http
    - undici
    - Netty
    - HttpObjectDecoder
    - Jetty
    - org.apache.coyote
    - mod_proxy
    - ngx_http_proxy_module
  function_keywords:
    - proxy
    - upstream
    - forward
    - cache
    - cacheable
    - cachekey
    - vary
    - content_length
    - transfer_encoding
    - chunked
    - keepalive
    - pipeline
    - normalize
    - rewrite
    - x_forwarded
    - host
    - via
  function_calls:
    - httputil.NewSingleHostReverseProxy
    - ReverseProxy.ServeHTTP
    - http.ListenAndServe
    - req.Header.Get
    - r.Header.Set
    - proxy_pass
    - proxy_cache
    - proxy_set_header
    - add_header
    - createProxyServer
    - res.setHeader
    - cache.set
    - cache.get
    - make_cache_key
    - parse_request
    - getHeader
    - setHeader
  cwes:
    - CWE-444
    - CWE-525
    - CWE-348
    - CWE-697
    - CWE-436

key_questions:
  - "Does any hop accept BOTH Content-Length and Transfer-Encoding on the same request, and if so do the front and back ends resolve the conflict the same way -- or can one be made to honor CL while the other honors chunked TE (CL.TE / TE.CL), or honor neither when TE is obfuscated (Transfer-Encoding: chunked with a leading space, tab, xchunked, duplicated, or chunked, identity)?"
  - "Is there a path where the front end forwards a request the back end treats as having an empty body (CL.0) -- e.g., the back end ignores Content-Length on a method/route it thinks is bodyless -- so the declared body bytes are reinterpreted as the START of the next victim's request on a reused keepalive connection?"
  - "If HTTP/2 terminates at the edge and is downgraded to HTTP/1.1 upstream, does the rewriter re-derive Content-Length / strip Transfer-Encoding from the HTTP/2 frame, or can H2 pseudo-headers / a smuggled TE survive the translation (H2.CL / H2.TE / H2.0 desync)?"
  - "Does the cache key include EVERY input that changes the response -- Host, X-Forwarded-Host, X-Forwarded-Scheme, X-Forwarded-Port, X-Host, X-Original-URL, Accept-Language, cookies reflected into the body, the port -- or is any response-affecting header UNKEYED, so one poisoning request pins a malicious response for all later users?"
  - "Are static-looking suffixes / path segments (/account.css, /profile;foo.js, /api/me/nonexistent.css, encoded %2F, trailing /) cached by the edge on rules that key off extension or prefix, while the origin ignores the suffix and returns the authenticated, per-user page (cache deception) -- leaking other users' data into a shared cache entry?"
  - "Are hop-by-hop headers (Connection, plus whatever it names, Keep-Alive, Transfer-Encoding) and length framing fully normalized/re-emitted by the proxy, or are duplicate / conflicting / smuggled-via-Connection headers passed through to the upstream verbatim?"

prompt_addendum: |
  This is an EDGE / multi-hop bug, not a single-function bug. The
  vulnerability lives in the GAP between two HTTP parsers that disagree,
  or between what the cache keys and what the origin reads. Semgrep sees
  one process; you must reason about two hops sharing a TCP connection.

  REQUEST SMUGGLING / DESYNC (CWE-444 / CWE-697 / CWE-436). Find every
  place a request body's length is determined and ask whether two
  components can pick different answers:
    * CL.TE: front end uses Content-Length, back end uses
      Transfer-Encoding: chunked. The front forwards the whole body; the
      back ends the request at the 0-chunk terminator and treats
      trailing bytes as a new request. TE.CL is the inverse.
    * TE.TE / TE obfuscation: a hop "validates" TE with a naive check
      (exact == "chunked", a contains() test, or only the FIRST of two
      TE headers) so one hop honors chunked and the other falls back to
      CL. Real obfuscations: a tab or leading space before "chunked",
      "xchunked", a Transfer-Encoding header sent twice,
      "chunked, identity", or TE smuggled as a value of Connection so the
      proxy strips it but the origin already saw it. If you see code
      comparing the TE header with ==, strings.EqualFold,
      .contains("chunked"), or reading headers["transfer-encoding"] as a
      single value when the wire can carry several -- flag the framing
      decision.
    * CL.0 / request tunnelling: the back end ignores Content-Length on
      certain methods/paths (GET with a body, a route wired to a handler
      that never reads the body, or a server that drops bodies on
      non-POST). The front sends N body bytes the back never consumes, so
      those bytes prefix the next pipelined request. Look for proxies
      that reuse upstream keepalive connections across clients
      (http.Transport defaults, connection pools) -- that reuse is what
      turns a desync into a cross-user attack.
    * HTTP/2 downgrade (H2.CL / H2.TE / H2.0): if the edge speaks HTTP/2
      to clients but HTTP/1.1 upstream, the translator must IGNORE any
      client-supplied content-length and re-emit framing from the H2 data
      frames, and must reject TE entirely. If the code copies a
      content-length header from H2 into the H1 request, or forwards a
      transfer-encoding, the back-end length is now attacker-chosen.
      This is the Netflix/Zuul (Netty) and Cloudflare H2-downgrade class.
      Also watch H2 header/pseudo-header injection: a CR-LF or a :path /
      :method carrying a whole second request line that the H1 upstream
      re-parses.
    The fatal shape across all of these is: ONE TCP connection to the
    upstream is REUSED for multiple front-end clients, AND the two hops
    can be made to disagree on where request K ends. Consequence: the
    attacker prepends bytes to a stranger's request -- capturing their
    creds/cookies, or forcing them to fetch a poisoned URL.

  WEB CACHE POISONING via UNKEYED INPUT (CWE-525 / CWE-348). The cache
  key is supposed to be the identity of a response. Poisoning works when
  a header that CHANGES the response is NOT part of that key. Classic
  unkeyed inputs the origin reflects: X-Forwarded-Host /
  X-Forwarded-Scheme / X-Forwarded-Port / X-Host / X-Original-URL /
  X-Rewrite-URL reflected into an absolute link, a redirect Location, a
  script src, or an OAuth/redirect base. Trace: does a handler read
  req.Header.Get("X-Forwarded-Host") (or
  request.headers['x-forwarded-host'], $_SERVER['HTTP_X_FORWARDED_HOST'])
  and emit it into the BODY or a cached header, while the CDN/Varnish/
  nginx cache key is only method+host+path? If so, one request with a
  malicious XFH pins a body pointing at attacker JS for every later
  visitor. Also: cache-key normalization gaps -- the cache treating
  ?utm_x= or ;param as part of an unkeyed query, fat-GET (body reflected
  but unkeyed), and Vary that omits the header the origin actually varied
  on. The move semgrep can't make: correlate the SET of headers the
  origin READS-and-REFLECTS against the SET the cache KEYS; any header in
  the first set but not the second is a poisoning primitive.

  WEB CACHE DECEPTION (CWE-525). Inverse direction: a dynamic, per-user,
  authenticated response gets stored under a key the VICTIM is tricked
  into requesting, then the attacker reads it from the shared cache.
  Mechanism: the edge caches by file extension or static prefix
  (a regex like \.(css|js|jpg|png|ico|woff)$, or /static/), but the
  ORIGIN ignores a trailing /foo.css or ;x.js or an extra path segment
  and routes to the user's account page (returns 200 with private data).
  The path delimiter disagreement (/, ;, %2F, %00, trailing slash, or the
  origin's "longest route prefix wins") is the bug. Check whether
  cacheability is decided on the RAW path suffix while routing collapses
  or ignores that suffix. The 2022 ChatGPT and 2017 PayPal/Bugcrowd
  reports are this exact class.

  Conclude a finding when you can name (a) the two components that parse
  the same bytes, (b) the specific input each one trusts differently
  (CL vs TE, raw-suffix vs route, unkeyed header vs cache key), and (c)
  the reuse/sharing that makes it cross-user (a reused upstream keepalive
  connection, or a shared cache entry). A length/TE check, a Host check,
  or a cache rule that only one of the two hops enforces is not a
  mitigation -- the disagreement IS the bug.

exemplars:
  - cve: CVE-2019-20372
    title: nginx error_page request smuggling via discarded request body
    pattern: |
      nginx before 1.17.7, when an error_page internal redirect is
      configured (a common pattern returning a custom page on 401/403/
      404), does not discard the request body on the redirected path. An
      attacker sends a request that nginx answers from the error_page
      handler while the declared Content-Length body bytes are left in
      the connection buffer; on a reused keepalive connection those bytes
      are parsed as the prefix of the next request, smuggling a
      victim-visible request past front-end access controls.
    why_buggy: |
      Two parts of the same server disagreed on whether the body had been
      consumed: the error_page short-circuit returned a response without
      draining the Content-Length bytes, so the connection's read cursor
      was left mid-request. The framing assumption "after I send a
      response, the next bytes are a fresh request" was violated because
      the body of the CURRENT request was never read. Reused keepalive
      turned a single-connection parsing quirk into a cross-request
      smuggle, letting an attacker route a request to an endpoint the
      front-end policy should have blocked.
  - cve: CVE-2021-21295
    title: Netty HTTP/2-to-HTTP/1.1 request smuggling via unvalidated content-length
    pattern: |
      Netty (io.netty:netty-codec-http2) before 4.1.60.Final did not
      validate a Content-Length header carried in a single HTTP/2 header
      frame with endStream set, so the field was propagated up by
      Http2MultiplexHandler unchecked. When such a request was proxied
      and translated to HTTP/1.1 (the Netflix/Zuul deployment that
      reported it), the attacker-supplied length let the HTTP/1.1
      upstream parse a second request out of the first request's body on
      a pooled connection.
    why_buggy: |
      The downgrade translator trusted client-supplied framing across a
      protocol boundary where it must be authoritative instead. HTTP/2
      frames the body explicitly, so on conversion the proxy MUST emit
      its own Content-Length and forbid Transfer-Encoding; by letting an
      attacker-influenced length survive, the front (H2) and back (H1)
      disagreed on request boundaries. The reused upstream connection
      then mapped one client's smuggled bytes onto another client's
      request -- the canonical H2.CL desync that fells edge proxies that
      bolt HTTP/2 termination in front of legacy HTTP/1.1 origins.
  - cve: CVE-2023-25690
    title: Apache httpd mod_proxy RewriteRule/ProxyPassMatch request splitting -> smuggling + cache poisoning
    pattern: |
      Apache HTTP Server 2.4.0 through 2.4.55, with mod_proxy enabled and
      a RewriteRule or ProxyPassMatch whose non-specific capture (e.g.
      (.*)) copies user-controlled request-target bytes back into the
      proxied request-target via variable substitution, forwards
      attacker-supplied CR/LF to the origin. The decoded line breaks
      become a new header or a whole second request at the backend,
      yielding request splitting/smuggling -- which the advisory notes can
      bypass proxy access controls, proxy unintended URLs to the origin,
      and poison the cache.
    why_buggy: |
      The proxy re-inserted raw, undecoded user input into the upstream
      request line, so the front (Apache) and back (origin) disagreed on
      how many requests the byte stream contains: Apache saw one rewritten
      request, the origin saw two. This is the same inconsistent-framing
      root cause as a CL/TE desync, but the splitting primitive is an
      unsanitized URL substitution rather than a length header. Because
      the second, smuggled request rides the shared proxy-to-origin
      connection, it can be steered to an access-controlled URL or used to
      pin a poisoned entry in a downstream cache -- the bridge from
      smuggling to web cache poisoning.
  - cve: CVE-2018-14773
    title: Symfony HttpFoundation trusts X-Original-URL / X-Rewrite-URL -> cache and access-control bypass
    pattern: |
      Symfony (HttpFoundation) before 2.7.49 / 2.8.44 / 3.3.18 / 3.4.14 /
      4.0.14 / 4.1.3 honored the legacy IIS headers X-Original-URL and
      X-Rewrite-URL, letting a client override the request path Symfony
      used internally. The visible request-target seen by an upstream
      cache or web server (and any path-based access rule or cache key it
      enforced) no longer matched the URL the application actually served,
      so a request keyed/authorized as one path was answered as another.
    why_buggy: |
      The application read a client-supplied header as the authoritative
      URL while the front-end cache and access controls keyed on the real
      request line -- the exact UNKEYED-INPUT disagreement: an input that
      changes which response the origin returns is invisible to the layer
      that decides cacheability and authorization. An attacker can use the
      override header to fetch a restricted page through a permissive
      front-end path, or to make the origin emit a response under a cache
      key that other users will later hit, which is web cache poisoning
      driven by a header the cache never keyed (CWE-525 / CWE-348). It
      generalizes the X-Forwarded-Host / X-Host family the prompt flags.
