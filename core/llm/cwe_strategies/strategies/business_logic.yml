name: business_logic
description: |
  Higher-order business-logic abuse: bugs where every line is individually
  "valid input handled correctly," yet the SEQUENCE, the SIGN, the MAGNITUDE,
  or the IDENTITY behind a state transition violates an economic or workflow
  invariant the code never wrote down. The trust lens: the application assumes
  callers move through its flows the way the UI does — forward, once, with
  positive quantities, paying before they get the goods, redeeming a coupon
  they were granted, within a quota — and the server enforces field types and
  authentication but not the RULES OF THE GAME. This is the SaaS/fintech
  "Pricing Pressure Test": negative/overflow quantities and prices, coupon /
  referral / loyalty / credit stacking, price and cart tampering, free-trial
  and signup re-abuse, refund and balance double-spend, and state-machine
  bypass (skip-payment, out-of-order steps) plus quota / rate-limit evasion.

signals:
  paths:
    - /api/
    - controllers/
    - handlers/
    - routes/
