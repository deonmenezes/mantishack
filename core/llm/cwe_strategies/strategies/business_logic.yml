    - check_quota
    - incr
    - construct_event
  cwes:
    - CWE-840   # Business Logic Errors
    - CWE-841   # Improper Enforcement of Behavioral Workflow (bad sequencing)
    - CWE-770   # Allocation of Resources Without Limits or Throttling (quota)
    - CWE-639   # Authorization Bypass Through User-Controlled Key (ownership)
    - CWE-20    # Improper Input Validation (sign/range on quantity & price)
    - CWE-190   # Integer Overflow or Wraparound (price * qty wrap)
    - CWE-602   # Client-Side Enforcement of Server-Side Security (trusted price/cart)
    - CWE-362   # Race Condition / TOCTOU (non-atomic redeem, transition, balance)
    - CWE-799   # Improper Control of Interaction Frequency (signup/trial re-abuse)

key_questions:
  - "Quantity and price: is every count, qty, or amount that feeds a charge, a refund, an inventory decrement, or a credit grant proven NON-NEGATIVE and range-bounded BEFORE the arithmetic — or can a negative quantity flip a debit into a credit, a negative line item cancel out a real one, or a huge qty * price wrap past a 32/64-bit / money-type boundary into a tiny or negative total?"
  - "Price provenance: does the server compute the price/total from a TRUSTED catalog keyed by product id at charge time, or does it trust a price, amount, currency, or line-total that arrived in the request body, a hidden form field, or a client-built cart it never re-prices? (Equivalent for payment-gateway callbacks: is the amount re-derived server-side and re-verified against the gateway, or believed from the client / an unverified webhook?)"
  - "Promotion stacking and reuse: is each coupon / referral / loyalty / credit redemption enforced AT MOST ONCE per the intended scope (per user, per order, never with itself, not combinable with another promo) under a single atomic, idempotent, race-safe operation — or can concurrent or repeated requests redeem the same code twice, stack incompatible discounts, or self-refer to mint credit?"
  - "Workflow sequencing: for any flow with required ordered steps (add-to-cart -> validate -> PAY -> fulfill/ship/grant-access, or request-refund -> approve -> issue), can a caller invoke a LATER step directly, skip the payment/approval step, or replay an earlier step — because each handler only checks the object exists and the caller is logged in, not that the object is in the exact prior state this transition requires?"
  - "State-transition guard: is the legal current state asserted IN THE SAME transaction that performs the transition (e.g. `UPDATE ... WHERE status='pending'` returning rows-affected, or a row-locked check), or is status read, decided in app code, then written back later — leaving a window where the same order is paid/fulfilled/refunded twice, or a balance double-spent?"
  - "Identity-bound limits: are free-trial, one-per-customer, signup-bonus, and per-account quotas bound to a STABLE, costly-to-rotate identity and enforced server-side, or to something the attacker mints for free (a fresh email, `+tag` / dotted Gmail aliases, a normalized-away unicode address, a cleared cookie/device id, a header the client sets) — letting them re-abuse the offer or evade the rate limit at scale?"

prompt_addendum: |
  These bugs are invisible to a scanner because there is no tainted sink and
  no dangerous API — the code does exactly what it was told. The vulnerability
  is the GAP between the implicit economic/workflow invariant and what the code
  actually enforces. Your job is to name the invariant, then prove the code
  can be driven to violate it. Work these moves, none of which semgrep can do
  alone:

  (1) SIGN AND MAGNITUDE on every economic quantity. Trace each request-derived
  number that reaches money or inventory: quantity/qty/count, price/amount/
  total, points/credits. Ask whether anything rejects negatives and absurd
  magnitudes BEFORE the math. The classic shapes:
    * Negative quantity -> negative line total -> the cart subtracts money or
      mints store credit/refund. (Adding 1 of item A and -2 of item B nets a
      payout while the order looks "paid.") A `qty > 0` guard, or an unsigned
      type, must exist on the SAME value used in the total.
    * Negative or client-supplied price/amount, including a refund handler that
      believes a `refund_amount` from the body instead of `min(captured,
      remaining)` from server records.
    * Overflow/wraparound: `price * quantity`, points conversions, or a money
      field stored as a 32-bit cent integer where a giant quantity wraps the
      total to near-zero or negative. Decimal/BigDecimal don't wrap but can
      still go negative; fixed-width ints and JS `Number` (2^53, float cents)
      can. Flag arithmetic on attacker-sized factors with no upper bound.
    * Rounding/precision abuse: per-line rounding that, summed over many tiny
      items or a sub-cent currency, lets the charged total drift below the true
      total (the "salami" shape).

  (2) PRICE/AMOUNT PROVENANCE. Find where the charge amount is decided. If it
  is read from the request (a `price`, `amount`, `total`, `currency`, or whole
  cart/line-item array posted by the client) rather than recomputed from a
  server-side catalog at capture time, it is tamperable — change the price,
  swap an expensive SKU's id onto a cheap price, or downgrade the currency
  (pay 100 of a weaker unit as 100 of a stronger one). Watch specifically for a
  server that enforces a pricing rule (e.g. "this product cannot be a name-
  your-price item") only in the UI / client and never re-checks it on the
  server at order time — the CVE-2025-12115 (WPC Name Your Price for
  WooCommerce) class, CWE-602. For Stripe/Braintree/PayPal/Razorpay flows
  specifically: the amount and currency must be set server-side when the
  PaymentIntent/Order is created, and the success webhook must be
  SIGNATURE-VERIFIED (e.g. Stripe `Webhook.construct_event`) and matched back
  to the server's expected amount and order id. Trusting a client "payment
  succeeded" callback, an unsigned webhook, or a client-chosen amount is the
  bug.

  (3) PROMOTION STACKING, REUSE, AND RACES. For coupons / referrals / loyalty /
  gift-card / credit redemption, the invariant is "at most once, within its
  declared scope, atomically." Look for:
    * Read-modify-write on a code's "used" flag or a balance that is not
      atomic/locked — two concurrent redemptions both see `used=false` and both
      apply. The correct shape is a conditional single-statement update
      (`UPDATE coupons SET used=true WHERE code=? AND used=false` checking
      rows-affected) or `SELECT ... FOR UPDATE`, NOT `if not used: used=True;
      save()`. This is the Starbucks "double your balance" race-condition class
      reported by Egor Homakov — concurrent transfers between gift cards minted
      free balance.
    * Same coupon applied N times to one cart, two coupons applied when only
      one is allowed, or a percentage stacked on a fixed discount with no
      mutual-exclusion check.
    * Referral self-abuse: a user referring themselves (same person, new
      account / new email alias) to mint signup credit on both ends, with no
      check that referrer != referee by a stable identity.
    * Gift-card / store-credit balance that is checked then debited in two
      steps, double-spendable under concurrency.

  (4) WORKFLOW SEQUENCING AND STATE MACHINE (CWE-841). Map the intended order
  of a multi-step flow and prove every later handler asserts the required prior
  state. The dangerous pattern is per-step handlers that each only check
  existence + auth: a caller posts straight to `/order/{id}/fulfill` or
  `/order/{id}/confirm` without ever paying, or replays `request-refund` after
  it was approved, or re-submits a one-time action. The transition guard MUST
  be enforced atomically with the write: `... WHERE status = <expected>` with
  rows-affected checked, or a locked row, so two requests cannot both move a
  `pending` order to `paid`/`refunded`. A status that is read, branched on in
  application code, then written back later is a TOCTOU on the state machine —
  the same order gets fulfilled twice, the same refund issued twice, the same
  balance spent twice. Skip-payment is the headline: prove access/goods are
  granted ONLY on a state that can only be reached by a verified payment, never
  by a directly-callable later endpoint.

  (5) IDENTITY-BOUND LIMITS AND RE-ABUSE (CWE-770 / CWE-799). For free trials,
  one-per-customer offers, signup bonuses, and per-account quotas/rate limits,
  the invariant binds a benefit to a costly-to-rotate identity. It breaks when
  the binding is to something free to mint: email local-part tricks
  (`user+tag@`, dotted Gmail `u.s.e.r@gmail.com`, case/unicode-normalized
  addresses that collapse to one mailbox but are treated as distinct on
  signup), disposable-domain emails, a device/cookie id the client clears, or
  an IP/header the attacker rotates. Also flag quota checks that are not atomic
  (check-then-act lets a burst exceed the limit) and limits enforced only on
  the client. The detector move: find the uniqueness/identity key for the
  offer and ask how cheaply an attacker manufactures a fresh one.

  Conclude a business-logic finding when you can state (a) the unwritten
  invariant, (b) the exact request sequence or value that violates it, and (c)
  why the code's checks (type/auth/existence) do not cover it. Favor
  HIGH-CONFIDENCE, low-false-positive calls: a missing sign check on a
  quantity that reaches a charge, a price trusted from the body, a non-atomic
  redeem/transition, or a trial keyed on a free-to-mint email are concrete and
  demonstrable — not stylistic.

exemplars:
  - cve: CVE-2025-12115
    title: WPC Name Your Price for WooCommerce — server trusts a client price the UI was told to disable (price tampering)
    pattern: |
      The WPC Name Your Price for WooCommerce WordPress plugin (versions up to
      and including 2.1.9) lets a merchant disable the "name your own price"
      feature for a specific product, but only enforced that toggle in the
      client/UI. The server did not re-check, at order time, that the product
      was actually allowed to carry a custom price, so an unauthenticated
      attacker could submit a crafted request setting an arbitrary lower price
      for a product whose custom pricing was supposed to be off, and buy it for
      less than it should ever cost.
    why_buggy: |
      The unwritten invariant — the price charged for a SKU is decided by the
      server from the product's own configuration at order time, never accepted
      from the request when that product forbids custom pricing — was enforced
      only on the client. Classified CWE-602 (Client-Side Enforcement of
      Server-Side Security): the server believed a price/flag the browser was
      merely told not to send. The detector lesson: any price/amount/total that
      originates in the request and is gated only by a UI rule, not re-derived
      and re-validated server-side against the product's authoritative
      configuration before charge, is price tampering — independent of how well
      the field is type-validated.

  - cve: Starbucks gift-card balance race (Egor Homakov, 2015)
    title: Concurrent gift-card transfers mint free balance via a redeem/transfer race
    pattern: |
      Starbucks' gift-card system let a user transfer balance between cards.
      Egor Homakov fired two identical transfers from the same source card at
      once using two browsers with different session cookies; the transfer read
      the source balance and then credited the destination and debited the
      source in separate, non-atomic steps (a classic check-then-act / TOCTOU
      on the balance). Both concurrent operations observed the original balance
      and both credited the destination, so the account ended with more money
      than ever existed — he turned a $15 load into $20 of spendable balance and
      verified it with a real $16.70 purchase.
    why_buggy: |
      The economic invariant "total balance is conserved across a transfer; a
      given amount can be debited at most once" was enforced in application
      code over a read-then-write window instead of atomically. Under
      concurrency the window let the same source funds be spent twice. The
      correct shape is a single conditional, row-locked debit
      (`UPDATE ... SET balance = balance - :amt WHERE id = :src AND balance >= :amt`
      with rows-affected checked, inside one serialized transaction), never a
      separate read, decide, and two writes. The detector lesson: any
      money/credit/coupon mutation that is read-modify-write without atomicity
      or a row lock is double-spendable (CWE-362) — assume an attacker will
      race it.

  - cve: CVE-2025-56426
    title: Bagisto — negative cart-item parameter subtracts from the total, placing an order without payment
    pattern: |
      In the Bagisto Laravel e-commerce platform, an attacker can set a cart
      item's quantity parameter to a negative value. Because the server
      validates the field type but not its sign, and the total is computed by
      summing per-line `price * quantity`, a negative-quantity line produces a
      negative subtotal that SUBTRACTS from the cart total instead of adding to
      it. Adding a $500 product and another $100 product with quantity = -1
      drives the total to zero or negative; the backend accepts the malformed
      total and lets the attacker place the order with no real payment due.
    why_buggy: |
      The implicit invariant — a purchasable quantity is a positive integer and
      no line item may reduce the amount owed — was never asserted before the
      arithmetic, so a sign the UI would never send flipped a charge into a
      discount and even into a skip-payment. Type validation ("is it a number")
      passed; the missing check was the SIGN and lower bound on the SAME
      quantity used in the total (CWE-840 / CWE-20). The detector lesson: trace
      every request-supplied quantity/price into the total computation and
      require a non-negative, range-bounded guard on that exact value; a
      negative economic quantity is a high-signal business-logic flaw scanners
      miss because each operation is individually well-formed.

  - cve: CVE-2023-45854
    title: Shopkit 1.0 — integer overflow on the add-to-cart quantity yields a negative quantity
    pattern: |
      Shopkit 1.0's add-to-cart function takes a quantity from the `qtd`
      request parameter. Supplying a sufficiently large integer causes the
      value to overflow and wrap to a negative number, letting the attacker
      introduce negative quantities into the cart. The resulting negative line
      values corrupt the cart and order total the same way an explicit negative
      quantity would, lowering the amount due.
    why_buggy: |
      The invariant — the quantity used in pricing is a bounded, non-negative
      integer — failed not because the attacker sent a literal negative, but
      because an unbounded magnitude wrapped past the integer boundary into one
      (CWE-190, Integer Overflow or Wraparound). A naive `qty >= 0` check that
      runs after the overflow still passes. The detector lesson: a sign check is
      necessary but not sufficient; economic factors must ALSO be magnitude-
      bounded BEFORE any width-limited arithmetic, because overflow manufactures
      the very negative (or near-zero) value a sign guard was meant to exclude.
