name: broken_object_authz
description: |
  Object- and function-level authorization on web/app routes. The bug
  class: a request carries an identifier (a row id, slug, uuid, account
  number, file key) or reaches a privileged handler, and the code acts on
  the named object — or runs the privileged action — WITHOUT proving the
  authenticated caller is allowed to touch THAT object or invoke THAT
  function. The trust lens: authentication ("who are you") is often
  present, but authorization ("may you touch this specific thing") is
  missing, partial, or enforced on the wrong layer (UI / route
  registration instead of the data access). Covers IDOR / BOLA
  (object-level), BFLA (function-level on admin / privileged routes), and
  authorization bypass through a user-controlled key. Note that some of
  these routes are not even authenticated, so the gap can be
  unauthenticated-to-object as well as authenticated-to-someone-elses-object.

signals:
  paths:
    - controllers/
    - /api/
    - routes/
    - handlers/
    - resources/
    - views.py
    - viewsets.py
    - graphql/
    - resolvers/
    - endpoints/
    - serializers.py
  includes:
    - express
    - flask
    - django.http
    - rest_framework
    - fastapi
    - "@nestjs/common"
    - org.springframework.web.bind.annotation
    - WP_REST_Server
    - graphql
  function_keywords:
    - get_object
    - find_by_id
    - get_or_404
    - show
    - update
    - destroy
    - download
    - owner
    - tenant
    - resolve
    - permission_callback
    - is_admin
    - require_role
  function_calls:
    - findByPk
    - findOne
    - find_by
    - get_object_or_404
    - objects.get
    - findById
    - findByIdAndUpdate
    - getReference
    - current_user
    - request.user
    - getCurrentUser
    - register_rest_route
  cwes:
    - CWE-639   # Authorization Bypass Through User-Controlled Key (IDOR)
    - CWE-862   # Missing Authorization
    - CWE-863   # Incorrect Authorization
    - CWE-285   # Improper Authorization
    - CWE-566   # Authorization Bypass Through User-Controlled SQL Primary Key
    - CWE-201   # Insertion of Sensitive Information Into Sent Data (read-IDOR leak)

key_questions:
  - "The handler fetches an object using an id/slug/key taken straight from the request (path param, query string, JSON body). Between the fetch and the action, is there ANY check that the caller owns or may access THAT object — not just that they are logged in (or, for unauthenticated routes, that the route should be public at all)?"
  - "Is the ownership predicate enforced in the QUERY (`where owner_id = current_user`) or merely after-the-fact (or not at all)? A `findById(req.params.id)` with no tenant/owner scope returns any row to any caller."
  - "For privileged / admin routes: where is the role/capability check? Is it on the route registration, a frontend guard, or a middleware that this specific handler actually runs through — or is the handler reachable directly with the gate sitting somewhere that does not cover it?"
  - "Does authorization rely on something the client supplies and could forge — a `role` field in the body, an unverified JWT claim, a cookie, an `account_id` in the request, a hidden form field — rather than on server-side session identity?"
  - "Mutations and side-effect routes (update/delete/transfer/export/download): is the SAME object-level check applied as on the read path, or is authz only enforced on GET while POST/PUT/DELETE skip it?"
  - "For nested / related objects (`/orgs/:o/projects/:p/secrets/:s`): is access checked on the LEAF object, or only on the parent — letting a caller who owns the parent reach a child they do not?"

prompt_addendum: |
  Authentication may or may not be present in these handlers; do not be
  reassured by a login wall, a `@login_required`, or a non-null
  `current_user`, and do not assume a route is authenticated just because
  its neighbours are. The bug is the gap between whatever caller actually
  reaches the handler and "authorized for THIS object / THIS function."
  Run two moves a plain grep cannot do on its own:

  (1) DATA-FLOW the identifier. Find every request-derived value that
  names an object — `req.params.id`, `request.GET['id']`, a slug, a uuid,
  a filename, an `account_number` in the JSON body, a GraphQL `node(id:)`
  argument. Follow it to the data access. If it reaches
  `findById(id)` / `objects.get(pk=id)` / `get_object_or_404(Model, id)` /
  `findByPk(id)` and the resulting object is read, returned, updated, or
  deleted with NO predicate tying it to the caller (no
  `owner_id == request.user.id`, no `tenant_id` scope, no membership
  check), you have IDOR/BOLA. The tell is an ownership check that is
  ABSENT, not one that is wrong — so reason about what is missing, not
  only about what is written. A correct shape scopes the query itself:
  `Model.objects.filter(owner=request.user).get(pk=id)`, or checks
  membership after fetch and 403s before acting. Pay attention to which
  predicate is in the WHERE clause: a lookup keyed only on the
  request-supplied id, with the ownership/visibility predicate living
  elsewhere (or nowhere), is the exact shape of the GitLab issue-title
  disclosure below.

  (2) For PRIVILEGED FUNCTIONS (admin panels, user-management, billing,
  config, "promote", "impersonate", setup/install routes), find the
  role/capability gate and prove it actually guards THIS handler on the
  path the request takes. Common failures: the gate is a frontend route
  guard only; it is middleware registered on a different router prefix; it
  checks a role claim the client controls; the privileged precondition
  itself is attacker-influenceable (e.g. a "setup not finished" flag the
  attacker can flip via another unauthenticated endpoint, as in the
  Confluence case below); or the route is reachable on a sibling path
  (`/admin/..` vs `/internal/..`, or a REST endpoint registered with no
  `permission_callback`). If the privileged action runs and the only thing
  between an arbitrary caller and it is a check that lives off the actual
  request path, that is missing function-level authorization (BFLA).

  WordPress-specific: every `register_rest_route` MUST have a meaningful
  `permission_callback`. An omitted callback, or
  `'permission_callback' => '__return_true'`, on a data-returning route is
  a mechanical red flag; when the route also keys on a request-supplied
  id/slug/key it is IDOR (the ACF-to-REST-API case below).

  Across both: never trust a client-supplied authorization input. A
  `role`, `is_admin`, `org_id`, or `user_id` taken from the body, a query
  param, or an unverified token claim is attacker-controlled. The server
  must derive identity from the session and the authorization decision
  from server-side state, scoped to the specific object or function.

exemplars:
  - cve: CVE-2022-1352
    title: GitLab IDOR — member-restricted issue titles disclosed to unauthenticated
      callers via the Markdown API and a crafted issue id
    pattern: |
      An API endpoint (GitLab's Markdown rendering path) accepts a
      reference that resolves an issue by its id. For a project that is
      PUBLIC but whose issues are restricted to project members, the
      handler still resolves the issue and renders/returns its title. The
      lookup keys on the user-supplied issue id; the per-object
      confidentiality predicate ("issue is member-restricted, is the caller
      a member") is not enforced on this code path, so any issue id can be
      substituted and its title read.
    why_buggy: |
      The handler conflates "the project is public, so the endpoint is
      reachable" with "the caller may see this object." Route-level access
      passes; the per-OBJECT predicate (may the caller read THIS restricted
      issue) is the one that is missing. Critically, no authentication is
      required at all — CVE-2022-1352 is PR:N / CVSS 5.3, an unauthenticated
      confidentiality bypass (CWE-639), so do not assume a "logged-in user"
      precondition: the id is fully attacker-controlled. The finding move:
      trace the request id to the resolve/fetch, then ask which predicate
      proves the caller may read that specific row — and find it is not in
      the query and not enforced before the title is returned.

  - cve: CVE-2023-22515
    title: Confluence broken access control — unauthenticated reach to the admin
      setup endpoint, creating a new administrator
    pattern: |
      A privileged, install-time-only function (create the first
      administrator via /setup/setupadministrator.action) is meant to be
      reachable only while setup is incomplete. By hitting an
      unauthenticated endpoint (/server-info.action) that flips the
      server's view of setup state, an attacker re-enables the privileged
      setup handler and invokes it to create a new administrator account.
      The function-level gate that should keep this admin-only action
      unreachable post-install does not hold on the path the attacker
      exercises.
    why_buggy: |
      This is missing function-level authorization (BFLA): a high-privilege
      action is reachable by an actor who should never be allowed to invoke
      it, because the guard protecting the privileged function is
      bypassable / not enforced on the actual request path. No object id is
      involved — the failure is that invoking the privileged FUNCTION is not
      authorization-checked against the caller's real privilege. The
      precondition treated as the gate ("setup not finished") was itself
      attacker-influenceable. The finding move: for every admin / setup /
      privileged handler, prove the gate runs on THIS route for THIS caller,
      and check that any precondition standing in for the gate cannot be
      toggled by the attacker through another endpoint.

  - cve: CVE-2020-13700
    title: ACF to REST API (WordPress) IDOR — options endpoint with no real
      permission check, readable by unauthenticated callers
    pattern: |
      The plugin exposes wp-json/acf/v3/options/ and resolves stored values
      by a user-supplied key (reachable via path/permalink manipulation).
      The route has no real permission_callback, so the handler runs for
      unauthenticated callers and returns whatever record the
      user-controlled key names — including sensitive wp_options rows such
      as credentials. Affected through version 3.1.0.
    why_buggy: |
      Two failures compound: (a) missing authorization — the REST endpoint
      has no capability / permission_callback gating who may call it; and
      (b) authorization bypass through a user-controlled key (CWE-639) — the
      key that selects the object is taken straight from the request with no
      check that the caller may read THAT key. The fix is a real
      permission_callback plus scoping the readable keys. The finding move,
      WordPress-specific: every register_rest_route MUST have a meaningful
      permission_callback; an omitted callback or
      `'permission_callback' => '__return_true'` on a data-returning route
      is a mechanical red flag, and when the route also keys on a
      request-supplied id/slug/key it is IDOR.
