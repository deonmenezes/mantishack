name: template_injection
description: |
  Server-side template injection (SSTI) and expression-language (EL)
  injection. The bug class: an attacker-influenced string reaches a
  template ENGINE as template SOURCE -- not as template DATA. The trust
  lens: templates are code. The moment user input chooses or composes
  the template body, the renderer compiles and executes it, so the
  renderer's sandbox (or absence of one) is the only thing between the
  attacker and arbitrary expression / object-graph evaluation. Covers
  template engines (Jinja2, Twig, Freemarker, Velocity, Thymeleaf, ERB,
  Mako, Smarty, Handlebars, Liquid) and EL evaluators (Spring SpEL,
  Struts/Apache OGNL, MVEL, JSP/Jakarta EL) where the data/code boundary
  collapses into the renderer.

signals:
  paths:
    - templates/
    - app/views/
    - views/
    - partials/
    - .jinja
    - .j2
    - .ftl
    - .vm
    - .erb
    - .twig
    - .mustache
    - .liquid
  includes:
    - jinja2
    - from jinja2 import Template
    - from flask import render_template_string
    - mako.template
    - django.template.Template
    - freemarker.template.Template
    - freemarker.template.Configuration
    - org.apache.velocity
    - org.thymeleaf
    - ognl.Ognl
    - org.springframework.expression.spel
    - SpelExpressionParser
    - require 'erb'
    - Liquid::Template
    - handlebars
    - smarty
  function_keywords:
    - render
    - template
    - interpolate
    - evaluate
    - compile
    - merge
    - eval
    - from_string
  function_calls:
    - render_template_string
    - Environment().from_string
    - jinja2.Template
    - Template().render
    - mako.template.Template
    - Markup
    - new Template
    - cfg.getTemplate
    - createTemplate
    - Velocity.evaluate
    - mergeTemplate
    - process
    - parseExpression
    - getValue
    - SpelExpressionParser
    - Ognl.getValue
    - TemplateEngine.process
    - ERB.new
    - Liquid::Template.parse
    - Handlebars.compile
  cwes:
    - CWE-1336  # server-side template injection
    - CWE-917   # expression language injection
    - CWE-94    # code injection
    - CWE-95    # eval injection
    - CWE-74    # injection (generic)
    - CWE-116   # improper encoding/escaping of output

key_questions:
  - "Does any user-controlled value flow into the template SOURCE argument (the string compiled into a template) rather than into the template's DATA/context dict? Concatenation, f-strings, or .format() that builds the template body are the tell."
  - "Is the render API one that takes a raw string as the template (render_template_string, Template(str), Environment.from_string, ERB.new(str), Handlebars.compile(userInput)) versus one that loads a fixed file by a trusted, non-user-controlled name?"
  - "For EL engines (OGNL, SpEL, MVEL, JSP/Jakarta EL): does request data reach an expression PARSER/evaluator -- parseExpression, getValue, Ognl.getValue, Struts %{...} interpolation -- instead of being treated as an opaque parameter?"
  - "If a sandbox is claimed (Jinja2 SandboxedEnvironment, Freemarker new_builtin_class_resolver / no-Execute config, Velocity SecureUberspector), is it actually instantiated on THIS render path, or only on the documented one? A default jinja2.Environment() / Velocity engine is NOT sandboxed."
  - "Does the framework auto-evaluate attribute/error/redirect strings as expressions (Spring whitelabel error/approval view, Struts error messages, Thymeleaf fragment selectors and th:* with ${}) where the attacker controls a field that is later re-rendered?"
  - "Even inside a sandbox, can the attacker reach the object graph -- __class__ / __mro__ / __subclasses__ in Python, .class.classLoader / T(java.lang.Runtime) in Java/EL, freemarker.template.utility.Execute -- to escape into native code or read globals?"

prompt_addendum: |
  The detection move semgrep can't reliably make: distinguish template
  DATA from template SOURCE across a dataflow. A grep for ``render`` is
  worthless on its own -- almost every web handler renders. What matters
  is WHICH argument the tainted value lands in.

  SAFE (data): ``render_template("page.html", name=request.args["q"])``
  -- the template body is a fixed, trusted file; user input is a context
  variable that the engine auto-escapes.

  VULNERABLE (source): ``render_template_string("Hello " + request.args["q"])``
  or ``Environment().from_string(user_supplied).render()`` or
  ``Template(f"Welcome {user_name}").render()`` -- the user's bytes ARE
  the template, so ``{{7*7}}`` / ``${7*7}`` / ``#{7*7}`` / ``%{7*7}``
  evaluates to 49. Trace the FIRST argument of every string-template
  constructor back to its origin; if request/DB/header/filename data
  reaches it through concatenation, ``%``, ``.format()``, f-strings, or
  ``+``, it is SSTI until proven otherwise.

  Language-specific sinks to chase:
    * Python/Jinja2: ``render_template_string``, ``jinja2.Template(...)``,
      ``Environment().from_string`` on user data. Escape proof-of-concept:
      ``{{''.__class__.__mro__[1].__subclasses__()}}``. A plain
      ``Environment`` is unsandboxed; only ``SandboxedEnvironment``
      restricts attribute access -- and even it has known bypasses.
    * Python/Mako: ``Template(text).render()`` -- Mako has NO sandbox;
      ``${self.module.cache.util.os.system('id')}`` runs.
    * Java/Freemarker: ``new Template(name, new StringReader(userInput), cfg)``
      or ``cfg.getTemplate`` over a path the user names; the payload
      ``<#assign x="freemarker.template.utility.Execute"?new()>${x("id")}``.
    * Java/Velocity: ``Velocity.evaluate(ctx, w, tag, userInput)`` or
      ``engine.mergeTemplate`` -- ``#set($e=$x.class.forName('java.lang.Runtime')...)``.
    * Java EL / OGNL / SpEL: any ``parseExpression(userInput).getValue()``,
      ``Ognl.getValue(userInput, ...)``, Struts ``%{...}`` in a header or
      message argument, Spring SpEL where a reflected parameter is rendered
      by an expression-aware view (the whitelabel error/approval page
      evaluates ``${...}``). ``.class.classLoader`` and ``T(java.lang.Runtime)``
      are the gadget roots.
    * Ruby/ERB & Liquid: ``ERB.new(user_input).result(binding)`` exposes
      full Ruby; ``Liquid::Template.parse(user_input)`` is safer but
      ``render`` of a user-named partial can still leak.
    * Thymeleaf: fragment expressions and ``th:`` attributes built from
      request data -- ``__${T(java.lang.Runtime)...}__`` preprocessing.

  When a sandbox is present, do NOT stop -- verify it is wired on the
  exact code path under review (default constructors are unsandboxed),
  then probe whether the object graph is still reachable (``__class__``,
  ``classLoader``, ``T()``, builtins). A "sandboxed" render that still
  exposes the type system is an RCE waiting for a gadget. Report the
  SOURCE-vs-DATA flow and the specific sink; that's the finding.

exemplars:
  - cve: CVE-2017-5638
    title: Apache Struts 2 Jakarta multipart parser OGNL injection via Content-Type
    pattern: |
      The Jakarta multipart parser builds a localized error message from
      the raw ``Content-Type`` HTTP header when upload parsing fails
      (LocalizedTextUtil.findText), and that error string is later
      evaluated as an OGNL expression by the framework's message
      interpolation (``%{...}``). The header is fully attacker-controlled
      and flows from "data" into the expression-language evaluator as
      source.
    why_buggy: |
      The assumption violated: a request header is inert text. In reality
      Struts re-evaluated the constructed error message through OGNL, so a
      ``Content-Type`` like
      ``%{(#cmd='id').(#p=new java.lang.ProcessBuilder(...))...}`` was
      parsed and executed. EL injection collapses the data/code boundary --
      the evaluator walks the object graph (``@java.lang.Runtime@``) to
      reach arbitrary command execution. The detection move: follow the
      header value to a ``findText``/OGNL-interpolation sink, not to a
      string/HTML sink. Pre-auth unauthenticated RCE.
  - cve: CVE-2016-4977
    title: Spring Security OAuth SpEL injection via whitelabel approval/error view
    pattern: |
      When processing authorization requests using the whitelabel views,
      the ``response_type`` request parameter is echoed into the Spring
      approval/error response and evaluated as a Spring Expression Language
      (SpEL) ``${...}`` template expression rather than rendered as plain
      text. Affects spring-security-oauth 1.0.0-1.0.5 and 2.0.0-2.0.9.
    why_buggy: |
      The boundary violated: a query parameter reused in an error/approval
      view is treated as display DATA, but Spring's expression-aware
      whitelabel rendering compiled it as SpEL. ``response_type=${233*233}``
      returns ``54289`` in the response -- the oracle -- and
      ``${T(java.lang.Runtime).getRuntime().exec(...)}`` reaches RCE via
      ``T()`` type access. The lesson the recipe encodes: EL engines that
      auto-evaluate attribute/error strings turn any reflected parameter
      into an expression sink; trace the reflected param's path into an
      EL-rendering view, not into HTML escaping.
  - cve: CVE-2019-3396
    title: Atlassian Confluence Widget Connector macro Velocity template injection
    pattern: |
      The Widget Connector macro accepts a ``_template`` parameter that
      names the Velocity template path to render; an unauthenticated
      attacker supplies a template reference (including a path-traversal or
      attacker-staged path) so that attacker-influenced content is merged
      by the Velocity engine, evaluating embedded ``#set`` / ``$class``
      directives.
    why_buggy: |
      The assumption: the ``_template`` parameter names a fixed, trusted
      internal template. In reality it let the caller steer which template
      body Velocity rendered, so a Velocity payload reaching
      ``$class.inspect('java.lang.Runtime').type.getRuntime().exec(...)``
      executed on the server (and enabled path-traversal file read). The
      detection move the addendum teaches: when a render call takes a
      user-supplied template NAME or BODY, treat it as source -- the engine
      compiles what the attacker chose, and Velocity's object-graph access
      (``$class``) is the gadget into native code.
