name: toctou_race
description: |
  Web/app-tier time-of-check-to-time-of-use (TOCTOU) and concurrency
  races. The bug class: a handler reads state (balance, quota, voucher
  usage, lock flag, "already processed?"), decides in application code,
  then writes - and the read, the decision, and the write are NOT one
  atomic step. The shared resource is a DATABASE ROW or CACHE KEY; the
  "threads" are independent HTTP requests/workers; the fix is atomic SQL
  (conditional UPDATE with affected-rows check), a DB-level UNIQUE /
  ON CONFLICT idempotency key, or a row lock that spans the whole
  check-then-act - NOT a mutex around memory. Apply the lens: assume the
  same endpoint is hit N times in parallel (or via a single-packet,
  last-byte-synchronized burst) on the same row, all observing the same
  stale snapshot before any write lands.

signals:
  paths:
    - /api/
    - controllers/
    - handlers/
    - routes/
    - services/
    - wallet
    - billing
    - payment
    - checkout
    - coupon
    - voucher
    - redeem
    - account
  includes:
    - import threading
    - import asyncio
    - from django.db import transaction
    - django.db.models import F
    - import sqlalchemy
    - require('sequelize')
    - "gorm.io/gorm"
    - "\"sync\""
    - require 'active_record'
    - import redis
    - require('redis')
    - require('ioredis')
    - require('mongoose')
  function_keywords:
    - redeem
    - transfer
    - withdraw
    - deduct
    - debit
    - credit
    - reserve
    - claim
    - apply
    - consume
    - acquire
    - increment
    - balance
    - quota
    - process
  function_calls:
    - select_for_update
    - with_for_update
    - "FOR UPDATE"
    - "objects.get"
    - findOne
    - findByPk
    - findById
    - session.query
    - first_or_create
    - update_or_create
    - get_or_create
    - ".save()"
    - "ON CONFLICT"
    - "INSERT IGNORE"
    - SETNX
    - "SET NX"
    - INCR
    - INCRBY
    - DECR
    - DECRBY
    - "cache.get"
    - "cache.set"
    - "F("
    - "transaction.atomic"
    - "db.transaction"
    - advisory_lock
    - "pg_advisory_lock"
  cwes:
    - CWE-362   # concurrent execution using shared resource ('race condition')
    - CWE-367   # time-of-check time-of-use (TOCTOU)
    - CWE-366   # race condition within a thread
    - CWE-841   # improper enforcement of behavioral workflow (state-machine races)
    - CWE-668   # exposure of resource to wrong sphere (lifecycle/context bleed)

key_questions:
  - "Between the read of the guarded value (balance, remaining_uses, is_redeemed, status) and the UPDATE that mutates it, is there ANY window where a second concurrent request could read the same pre-mutation value? If the read and write are separate statements with no row lock, the answer is yes."
  - "Is the mutation expressed as a conditional atomic UPDATE (e.g. SET balance = balance - :amt WHERE id = :id AND balance >= :amt, with affected-rows checked) or as read-into-app, compute-in-app, write-back? Only the former is safe."
  - "Is there a unique/idempotency key enforced at the DATABASE level (UNIQUE index, INSERT ... ON CONFLICT DO NOTHING) for 'process this exactly once' operations - or is duplicate detection a prior SELECT that two requests can both pass?"
  - "If a lock IS taken (select_for_update, SETNX, pg_advisory_lock), does it cover the entire check-then-act, and is the value re-read AFTER the lock is held - not the stale value read before it?"
  - "Does the operation depend on a status transition (pending -> paid, unused -> used) guarded only by an `if status == X` in app code, allowing two requests to both see X and both transition?"
  - "Could a single-packet / last-byte-synchronized burst land N requests within the same DB snapshot window, defeating optimistic assumptions about request serialization?"

prompt_addendum: |
  Read this function as if EXACTLY this request is being replayed
  20 times in parallel against the same user / row / token, all
  arriving inside the same few milliseconds. The attacker controls
  concurrency, not just inputs. Find the guarded resource: a number
  that must not go negative (balance, credits, stock), a counter that
  caps uses (coupon redemptions, invite slots, rate-limit tokens), or a
  one-shot flag (order.paid, gift_card.redeemed, password_reset.used).
  Then locate the THREE-STEP shape:

    1. read  -> row = Model.objects.get(id=...)  /  SELECT ... (no lock)
    2. check -> if row.balance >= amount:  /  if not row.used:
    3. write -> row.balance -= amount; row.save()  /  UPDATE ...

  The detection move (beyond grep): grep finds step 1 and step 3
  separately; the bug is in the GAP between them. For each candidate,
  trace the lifetime of the guarded value across the three steps and
  answer one question - "does anything serialize two requests between
  the read and the write?" Concretely:

    - Does a lock/transaction OPEN before step 1 and stay held through
      step 3? A `transaction.atomic` that wraps the write but not the
      read does nothing; the read already happened on a stale snapshot.
    - Is the read a *locking* read (select_for_update / with_for_update /
      SELECT ... FOR UPDATE), or a plain `.get()` / findOne? A plain read
      under READ COMMITTED lets every concurrent request see the same
      pre-decrement value.
    - Is the write a blind assignment of an app-computed value
      (`balance = <python number>`), or an atomic in-DB expression
      (Django `F('balance') - amt`, SQL `balance = balance - x`) gated by
      a `WHERE balance >= amt` whose affected-row count is checked? Blind
      assignment is the tell; two writers both store `old - amt`.
    - For "exactly once" ops, is duplicate suppression an `if exists(...)
      : return` BEFORE an insert (two requests both pass it), or a
      DB-enforced UNIQUE / INSERT ... ON CONFLICT DO NOTHING / INSERT
      IGNORE (the DB rejects the second writer)? Only the latter is a
      real idempotency barrier.
    - For counters in Redis/cache, is it GET then SET (racy), or a single
      atomic INCR / DECR / INCRBY / Lua script? Is a SETNX lock taken,
      and is the guarded value re-read AFTER acquiring it - not the value
      read before?
    - For state machines, is `if obj.status == 'pending': charge();
      obj.status = 'paid'` gated by a `WHERE status = 'pending'` that
      checks affected rows, or can two requests both observe 'pending'
      and both charge?

  Net effect when the gap is unguarded: all N parallel requests read the
  SAME value, all pass the check, all write - one decrement sticks but
  money/credits are minted, or one flag-flip becomes N actions (double
  refund, multi-redeemed gift card, over-limit coupon). Distinguish from
  the C/kernel concurrency strategy: here the shared resource is a DB row
  or cache key and the threads are HTTP requests, so the fix is atomic
  SQL / unique constraints / row locks, not memory mutexes.

exemplars:
  - cve: CVE-2026-34368
    title: WWBN AVideo wallet balance double-spend via TOCTOU in transferBalance
    pattern: |
      transferBalance() in plugin/YPTWallet/YPTWallet.php reads the
      sender's wallet balance, checks sufficiency in PHP
      (if balance >= amount), then writes the decremented balance back -
      three separate steps with no DB transaction and no row-level lock
      spanning them. The endpoint is reachable by an authenticated user
      who can open many concurrent sessions. Affects versions up to 26.0;
      CWE-362.
    why_buggy: |
      The check (balance >= amount) and the act (write balance - amount)
      are not atomic. An attacker fires concurrent transfer requests;
      each reads the SAME stale balance before any write commits, so every
      request independently passes the sufficiency check. Only one
      decrement ultimately "sticks" on the sender, but the recipient is
      credited once per request - credits are minted from nothing. The
      violated assumption: "I already confirmed there were enough funds" -
      true at read time, false by write time because a parallel request
      mutated the row in between. The shipped fix wraps the operation in
      mysqlBeginTransaction() plus SELECT ... FOR UPDATE so the read locks
      the row, exactly the atomic-conditional / locking-read remedy.
  - cve: CVE-2024-58248
    title: nopCommerce gift card redeemed multiple times via single-packet race
    pattern: |
      Gift-card redemption during checkout (the /checkout/OpcConfirmOrder/
      endpoint) checks whether the card has remaining value / is unused,
      then applies it to the order and marks usage - as distinct read and
      write operations, with no lock on order placement before 4.80.0. A
      single-packet (last-byte-synchronized) attack, or two parallel
      sessions submitting the same card code, lands many redemption
      requests inside one DB snapshot window.
    why_buggy: |
      The "is this card still redeemable?" check and the "consume the card"
      write are not one atomic unit, and there is no unique/idempotency
      constraint making a given card-usage exactly-once. Synchronizing the
      final bytes of N requests so they execute concurrently makes them all
      observe the card as still valid, so all N redemptions succeed against
      a balance meant to be spent once - goods obtained for free. The lens
      that finds it: stop assuming requests are serialized - assume the
      attacker collapses them into the same instant, then ask what check
      would have caught the duplicate AFTER the first write (a DB-enforced
      unique key, an atomic decrement with affected-rows check, or a lock
      on order placement) and observe that none existed; the fix added
      locking for order placement in 4.80.0.
  - cve: CVE-2022-39328
    title: Grafana auth-middleware race assigning a privileged context to a public request
    pattern: |
      Per-request authentication/authorization context is built on shared
      structure during HTTP context creation (pkg/web). Under heavy
      concurrent load (versions 9.2.0-9.2.3), the construction of one
      request's context and the dispatch of another interleave, so an HTTP
      request can be associated with the auth/authz middleware decision
      computed for a DIFFERENT request.
    why_buggy: |
      This is a request-lifecycle race on shared mutable state, not a
      balance double-spend, but the same TOCTOU lens applies: the
      authorization decision is "checked" against one request's identity
      and "used" while serving another. Under load an unauthenticated
      request can be handled with a privileged request's middleware,
      reaching admin-only endpoints (CVSS lowered from 9.8 to 8.1; fixed in
      9.2.4). The detection move: when per-request security context lives in
      a field/object that is written then read across concurrent handlers
      without isolation, ask whether two in-flight requests can ever share
      or swap that context - i.e. whether the "who is this?" answer can
      drift between the moment it is decided and the moment it is honored.
