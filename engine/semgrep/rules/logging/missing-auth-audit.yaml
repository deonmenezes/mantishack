rules:
  - id: mantishack.logging.missing-on-auth-failure
    message: |
      Authentication failure path does not emit an audit log line — security
      monitoring will not see this event. Log auth failures at INFO/WARN with
      the failing principal (but never the credential).
    languages: [python, javascript, java]
    severity: MEDIUM
    patterns:
      - pattern-either:
          - pattern: |
              if not $AUTH:
                  return $RESP
          - pattern: |
              if (!$AUTH) {
                  return $RESP;
              }
      - pattern-not: |
          if not $AUTH:
              logger.$M(...)
              return $RESP
      - pattern-not: |
          if (!$AUTH) {
              log.$M(...);
              return $RESP;
          }
    metadata:
      cwe: ["CWE-778"]
      owasp: ["A09:2021-Security Logging and Monitoring Failures"]
      mantis_capability: auth-audit

  - id: mantishack.logging.missing-on-privileged-action
    message: |
      Privileged action (delete / admin / role-change) does not emit an audit log
      line — incident response cannot reconstruct activity. Log the action,
      actor, and target.
    languages: [python, javascript, java]
    severity: MEDIUM
    patterns:
      - pattern-either:
          - pattern: $USER.delete()
          - pattern: $DB.execute("DELETE FROM users WHERE ...")
          - pattern: $USER.role = $ROLE
          - pattern: $USER.is_admin = True
      - pattern-not-inside: |
          ...
          logger.$M(...)
          ...
    metadata:
      cwe: ["CWE-778"]
      owasp: ["A09:2021-Security Logging and Monitoring Failures"]
      mantis_capability: auth-audit

  - id: mantishack.logging.token-leak
    message: |
      Logging statement may write a raw JWT / bearer token / session id to logs.
      Mask the credential (`tok[:4] + "***"`) before logging.
    languages: [python, javascript, java]
    severity: HIGH
    pattern-either:
      - pattern: logger.$M(..., $JWT, ...)
      - pattern: log.$M(..., $TOKEN, ...)
      - pattern: console.log(..., $JWT, ...)
    metavariable-pattern:
      metavariable: $JWT
      patterns:
        - pattern-either:
            - pattern: jwt
            - pattern: token
            - pattern: bearer
            - pattern: session_id
            - pattern: sessionid
    metadata:
      cwe: ["CWE-532"]
      mantis_capability: auth-audit
