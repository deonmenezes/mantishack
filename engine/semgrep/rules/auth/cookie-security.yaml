rules:
  - id: mantishack.auth.cookie.missing-httponly
    message: |
      Cookie set without HttpOnly — accessible to client-side JavaScript and
      exfiltrable via XSS. Set HttpOnly=True for session / auth cookies.
    languages: [python, javascript, java]
    severity: HIGH
    pattern-either:
      - pattern: response.set_cookie($NAME, $VAL)
      - pattern: response.set_cookie($NAME, $VAL, httponly=False)
      - pattern: res.cookie($NAME, $VAL, {httpOnly: false})
      - pattern: Cookie cookie = new Cookie($N, $V);
    metadata:
      cwe: ["CWE-1004"]
      owasp: ["A05:2021-Security Misconfiguration"]
      mantis_capability: auth-audit

  - id: mantishack.auth.cookie.missing-secure
    message: |
      Cookie set without Secure flag — can be sent over plaintext HTTP and
      stolen via network interception. Set Secure=True.
    languages: [python, javascript, java]
    severity: HIGH
    patterns:
      - pattern-either:
          - pattern: response.set_cookie($NAME, $VAL, ...)
          - pattern: res.cookie($NAME, $VAL, $OPTS)
      - pattern-not: response.set_cookie($NAME, $VAL, ..., secure=True, ...)
      - pattern-not: res.cookie($NAME, $VAL, {..., secure: true, ...})
    metadata:
      cwe: ["CWE-614"]
      mantis_capability: auth-audit

  - id: mantishack.auth.cookie.missing-samesite
    message: |
      Cookie set without SameSite attribute — vulnerable to CSRF. Set
      SameSite=Lax (or Strict for auth cookies).
    languages: [python, javascript]
    severity: MEDIUM
    patterns:
      - pattern-either:
          - pattern: response.set_cookie($NAME, $VAL, ...)
          - pattern: res.cookie($NAME, $VAL, $OPTS)
      - pattern-not: response.set_cookie($NAME, $VAL, ..., samesite=..., ...)
      - pattern-not: res.cookie($NAME, $VAL, {..., sameSite: ...})
    metadata:
      cwe: ["CWE-352"]
      mantis_capability: auth-audit

  - id: mantishack.auth.cookie.session-id-in-url
    message: |
      Session identifier appearing in URL query parameter — leaks via referer
      headers, browser history, and server logs. Use cookies, not URL params,
      for session IDs.
    languages: [python, javascript, java]
    severity: HIGH
    pattern-either:
      - pattern: f"...?sessionid={$SID}..."
      - pattern: f"...?session_id={$SID}..."
      - pattern: '"?sid=" + $SID'
    metadata:
      cwe: ["CWE-598"]
      mantis_capability: auth-audit
