rules:
  - id: mantishack.auth.jwt.alg-none
    message: |
      JWT decode allows `alg=none` — token can be forged without a signature.
      Pin the algorithm explicitly (e.g. algorithms=["HS256"] / ["RS256"]).
    languages: [python, javascript, java]
    severity: HIGH
    pattern-either:
      - pattern: jwt.decode($T, ..., verify=False, ...)
      - pattern: jwt.decode($T, ..., options={"verify_signature": False}, ...)
      - pattern: jwt.decode($T, ..., algorithms=["none"], ...)
      - pattern: jwt.verify($T, $KEY, {algorithms: ["none"]})
      - pattern: Jwts.parser().setSigningKey($K).parse($T)
    metadata:
      cwe: ["CWE-347"]
      owasp: ["A02:2021-Cryptographic Failures"]
      mantis_capability: auth-audit

  - id: mantishack.auth.jwt.hardcoded-secret
    message: |
      JWT HMAC secret looks hardcoded / short — vulnerable to brute-force key recovery.
      Load secrets from environment / KMS, and require ≥32 bytes of entropy.
    languages: [python, javascript, java]
    severity: HIGH
    pattern-either:
      - pattern: jwt.encode($P, "...", algorithm="HS256")
      - pattern: jwt.sign($P, "...")
      - pattern: Jwts.builder().signWith(SignatureAlgorithm.HS256, "...".getBytes())
    metadata:
      cwe: ["CWE-798"]
      owasp: ["A02:2021-Cryptographic Failures"]
      mantis_capability: auth-audit

  - id: mantishack.auth.jwt.missing-expiry
    message: |
      JWT is issued without an `exp` claim — token never expires. Set a short TTL
      (`exp` claim) and use refresh tokens for long-lived sessions.
    languages: [python, javascript]
    severity: MEDIUM
    patterns:
      - pattern-either:
          - pattern: jwt.encode($PAYLOAD, ...)
          - pattern: jwt.sign($PAYLOAD, ...)
      - pattern-not: jwt.encode({..., "exp": ...}, ...)
      - pattern-not: jwt.sign({..., exp: ...}, ...)
    metadata:
      cwe: ["CWE-613"]
      mantis_capability: auth-audit

  - id: mantishack.auth.jwt.no-audience-check
    message: |
      JWT decoded without `audience` / `issuer` verification — accepts tokens
      minted by any party using the same key. Pin `audience` and `issuer`.
    languages: [python, javascript, java]
    severity: MEDIUM
    patterns:
      - pattern-either:
          - pattern: jwt.decode($T, $K, algorithms=[...])
          - pattern: jwt.verify($T, $K)
      - pattern-not: jwt.decode($T, $K, ..., audience=..., ...)
      - pattern-not: jwt.verify($T, $K, {audience: ..., issuer: ...})
    metadata:
      cwe: ["CWE-345"]
      mantis_capability: auth-audit
